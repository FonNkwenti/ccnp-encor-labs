!
! R4 -- Remote Site Router (AS 65003)
! Lab 04: Capstone II -- PRE-BROKEN (contains injected faults)
!
hostname R4
!
no ip domain-lookup
ipv6 unicast-routing
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
 ipv6 address 2001:DB8:FF::4/128
!
interface Loopback1
 description BGP_ADVERTISED_PREFIX
 ip address 172.16.4.1 255.255.255.0
 ipv6 address 2001:DB8:172:4::1/64
!
interface GigabitEthernet0/0
 description TO_R3
 ip address 10.0.34.2 255.255.255.252
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:34::2/64
 no shutdown
!
interface GigabitEthernet0/1
 description TO_PC2_LAN
 ip address 192.168.2.1 255.255.255.0
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:2:2::1/64
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router bgp 65003
 bgp router-id 4.4.4.4
 bgp log-neighbor-changes
 neighbor 10.0.34.1 remote-as 65002
 neighbor 10.0.34.1 description eBGP_TO_R3_AS65002
 neighbor 2001:DB8:34::1 remote-as 65002
 neighbor 2001:DB8:34::1 description eBGP_V6_TO_R3_AS65002
 !
 address-family ipv4
  network 172.16.4.0 mask 255.255.255.0
  neighbor 10.0.34.1 activate
  no neighbor 2001:DB8:34::1 activate
 exit-address-family
 !
 address-family ipv6
  network 2001:DB8:172:4::/64
  network 2001:DB8:2:2::/64
  no neighbor 10.0.34.1 activate
  neighbor 2001:DB8:34::1 activate
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
