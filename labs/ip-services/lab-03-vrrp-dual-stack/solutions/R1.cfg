!
! R1 -- Primary LAN Gateway (iosv)
! Lab 03: VRRP and Dual-Stack Gateway Redundancy -- Solution
! Removes HSRP; adds VRRPv3 group 1 (IPv4 Master, priority 110)
! and VRRPv3 group 1 address-family IPv6. Keeps track 1 decrement 20.
!
hostname R1
!
no ip domain-lookup
!
ipv6 unicast-routing
fhrp version vrrp v3
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
 ipv6 address 2001:DB8:FF::1/128
 ip ospf 1 area 0
 ipv6 ospf 1 area 0
!
interface GigabitEthernet0/0
 description TO_SW-LAN
 ip address 192.168.1.2 255.255.255.0
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:1:1::2/64
 ipv6 ospf 1 area 0
 ip nat inside
 ip ospf 1 area 0
 vrrp 1 address-family ipv4
  address 192.168.1.1 primary
  priority 110
  preempt
  track 1 decrement 20
 vrrp 1 address-family ipv6
  address 2001:DB8:1:1::1 primary
  priority 110
  preempt
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3_UPLINK
 ip address 10.0.13.1 255.255.255.252
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:13::1/64
 ipv6 ospf 1 area 0
 ip nat outside
 ip ospf 1 area 0
 service-policy output LAN-OUT
 no shutdown
!
interface GigabitEthernet0/2
 description TO_R2_DIRECT
 ip address 10.0.12.1 255.255.255.252
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:12::1/64
 ipv6 ospf 1 area 0
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router ospf 1
 router-id 1.1.1.1
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2
!
ipv6 router ospf 1
 router-id 1.1.1.1
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2
!
track 1 interface GigabitEthernet0/1 line-protocol
!
class-map match-any VOICE
 match dscp ef
class-map match-any VIDEO
 match dscp af41
class-map match-any CRITICAL-DATA
 match dscp af31
class-map match-any SCAVENGER
 match dscp cs1
!
policy-map LAN-OUT
 class VOICE
  priority percent 10
 class VIDEO
  bandwidth percent 20
  random-detect dscp-based
 class CRITICAL-DATA
  bandwidth percent 30
 class SCAVENGER
  police cir 128000 conform-action transmit exceed-action drop
 class class-default
  fair-queue
  random-detect
!
ip nat inside source static 192.168.1.10 10.0.13.10
ip access-list standard NAT-DYNAMIC
 permit host 192.168.1.20
ip nat pool NAT-POOL 10.0.13.100 10.0.13.110 netmask 255.255.255.0
ip nat inside source list NAT-DYNAMIC pool NAT-POOL
ip access-list standard NAT-PAT
 permit 192.168.1.0 0.0.0.255
ip nat inside source list NAT-PAT interface GigabitEthernet0/1 overload
!
ntp authentication-key 1 md5 NTP_KEY_1
ntp authenticate
ntp trusted-key 1
ntp master 3
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
