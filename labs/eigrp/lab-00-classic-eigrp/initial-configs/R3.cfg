!
! R3 -- Initial configuration (lab-00 starting point)
! IP addressing pre-loaded; EIGRP is NOT configured
!
hostname R3
!
no ip domain-lookup
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
interface GigabitEthernet0/0
 description TO_R1
 ip address 10.13.0.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R2
 ip address 10.23.0.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 description TO_PC1_LAN
 ip address 192.168.1.1 255.255.255.0
 no shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
