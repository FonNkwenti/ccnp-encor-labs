!
! R3 -- OSPF Lab 05 -- Capstone I: Full Protocol Mastery (SOLUTION)
! ABR between Area 0 (Gi0/0) and Area 2 (Gi0/1). Area 2 is NSSA.
! R3 translates Type 7 LSAs from R5 into Type 5 LSAs for Area 0.
!
hostname R3
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
 ipv6 address 2001:DB8:FF::3/128
 ospfv3 1 ipv6 area 0
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.3 255.255.255.0
 ip ospf priority 0
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:0:123::3/64
 ospfv3 1 ipv6 area 0
 no shutdown
!
interface GigabitEthernet0/1
 description AREA2_R5-Gi0/0
 ip address 10.2.35.1 255.255.255.252
 ip ospf network point-to-point
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:2:35::1/64
 ospfv3 1 ipv6 area 2
 no shutdown
!
router ospf 1
 router-id 3.3.3.3
 area 2 nssa
 network 3.3.3.3 0.0.0.0 area 0
 network 10.0.123.0 0.0.0.255 area 0
 network 10.2.35.0 0.0.0.3 area 2
!
router ospfv3 1
 router-id 3.3.3.3
 !
 address-family ipv6 unicast
  area 2 nssa
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
