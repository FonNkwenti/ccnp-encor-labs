!
! R3 -- Initial configuration (lab-01 starting point)
! Inherits lab-00 solution state: eBGP session to R1 already up (IPv4)
! New in lab-01 initial-configs:
!   - R2-R3 peering link (Gi0/1) -- IP pre-loaded, BGP neighbor NOT yet added
!   - IPv6 is NOT pre-loaded -- student adds it in Section 5
!
hostname R3
!
no ip domain-lookup
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
interface Loopback1
 description BGP_ADVERTISED_PREFIX
 ip address 172.16.3.1 255.255.255.0
!
interface GigabitEthernet0/0
 description TO_R1
 ip address 10.0.13.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R2
 ip address 10.0.23.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description TO_R4_UNUSED_IN_LAB01
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router bgp 65002
 bgp router-id 3.3.3.3
 bgp log-neighbor-changes
 neighbor 10.0.13.1 remote-as 65001
 neighbor 10.0.13.1 description eBGP_TO_R1_AS65001
 !
 address-family ipv4
  network 172.16.3.0 mask 255.255.255.0
  neighbor 10.0.13.1 activate
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
