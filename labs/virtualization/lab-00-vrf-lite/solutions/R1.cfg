hostname R1
!
vrf definition CUSTOMER-A
 rd 65001:100
 !
 address-family ipv4
 exit-address-family
!
vrf definition CUSTOMER-B
 rd 65001:200
 !
 address-family ipv4
 exit-address-family
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
interface Loopback1
 vrf forwarding CUSTOMER-B
 ip address 172.20.1.1 255.255.255.0
!
interface Loopback2
 vrf forwarding CUSTOMER-B
 ip address 192.168.1.100 255.255.255.0
!
interface GigabitEthernet0/0
 description R1->R3 WAN underlay
 ip address 10.0.13.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/0.100
 description R1->R3 VRF CUSTOMER-A transit
 encapsulation dot1Q 100
 vrf forwarding CUSTOMER-A
 ip address 172.16.13.1 255.255.255.252
!
interface GigabitEthernet0/1
 description R1->R2 direct underlay
 ip address 10.0.12.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description R1 LAN - CUSTOMER-A site 1
 vrf forwarding CUSTOMER-A
 ip address 192.168.1.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 1.1.1.1
 network 1.1.1.1 0.0.0.0 area 0
 network 10.0.13.0 0.0.0.3 area 0
 network 10.0.12.0 0.0.0.3 area 0
!
ip route vrf CUSTOMER-A 192.168.2.0 255.255.255.0 172.16.13.2
!
end
