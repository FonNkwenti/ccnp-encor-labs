objectives:
  - Configure OSPF process 1 on all routers and verify full convergence
  - Enable SSHv2 and restrict VTY to SSH on all routers
  - Enable NETCONF with candidate datastore on R1 and R2
  - Enable RESTCONF with HTTPS and local authentication on R1 and R2
  - Write a Python ncclient script to get-config, edit-config, and commit on R1
  - Write a Python requests script demonstrating all RESTCONF verbs and response codes on R2
  - Configure EEM syslog-triggered and cron-triggered applets on R3
  - Construct and submit valid ietf-interfaces and Cisco-IOS-XE-native JSON payloads
fault_scenarios:
  - scenario_01: R1 NETCONF subsystem disabled — Python script hangs and never completes
  - scenario_02: R2 HTTP authentication removed — all API requests fail immediately
  - scenario_03: R3 EEM applet syslog pattern broken — EEM messages absent from log
