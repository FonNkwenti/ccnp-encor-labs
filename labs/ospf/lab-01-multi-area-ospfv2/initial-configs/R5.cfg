!
! R5 — ASBR (Area 2 in later labs) — single-area in lab-00
! Lab 00: Single-Area OSPFv2 Fundamentals — Solution
!
hostname R5
!
no ip domain-lookup
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
!
interface GigabitEthernet0/0
 description TO_R3_Gi0/1
 ip address 10.2.35.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description LAN_PC2_SEGMENT
 ip address 192.168.2.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router ospf 1
 router-id 5.5.5.5
 passive-interface GigabitEthernet0/1
 network 5.5.5.5 0.0.0.0 area 0
 network 10.2.35.0 0.0.0.3 area 0
 network 192.168.2.0 0.0.0.255 area 0
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
