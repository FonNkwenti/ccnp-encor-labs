!
! R2 -- Branch A router
! Lab 00: Classic EIGRP Fundamentals -- Solution
! Classic EIGRP mode (router eigrp 100). Triangle branch member.
!
hostname R2
!
no ip domain-lookup
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
interface GigabitEthernet0/0
 description TO_R1
 ip address 10.12.0.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3
 ip address 10.23.0.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router eigrp 100
 eigrp router-id 2.2.2.2
 network 2.2.2.2 0.0.0.0
 network 10.12.0.0 0.0.0.3
 network 10.23.0.0 0.0.0.3
 no auto-summary
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
