hostname R3
no ip domain-lookup
!
!
vrf definition CUSTOMER-A
 rd 65001:100
 !
 address-family ipv4
 exit-address-family
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
interface GigabitEthernet0/0
 description R3->R1 WAN underlay
 ip address 10.0.13.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/0.100
 description R3->R1 VRF CUSTOMER-A transit
 encapsulation dot1Q 100
 vrf forwarding CUSTOMER-A
 ip address 172.16.13.2 255.255.255.252
!
interface GigabitEthernet0/1
 description R3->R2 WAN underlay
 ip address 10.0.23.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1.100
 description R3->R2 VRF CUSTOMER-A transit
 encapsulation dot1Q 100
 vrf forwarding CUSTOMER-A
 ip address 172.16.23.2 255.255.255.252
!
router ospf 1
 router-id 3.3.3.3
 network 3.3.3.3 0.0.0.0 area 0
 network 10.0.13.0 0.0.0.3 area 0
 network 10.0.23.0 0.0.0.3 area 0
!
ip route vrf CUSTOMER-A 192.168.1.0 255.255.255.0 172.16.13.1
ip route vrf CUSTOMER-A 192.168.2.0 255.255.255.0 172.16.23.1
!
end
