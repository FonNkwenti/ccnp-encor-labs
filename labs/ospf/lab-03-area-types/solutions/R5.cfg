!
! R5 -- OSPF Lab 03 -- Area Types (SOLUTION)
! ASBR in Area 2 (NSSA). R5 redistributes two external loopback networks
! (172.16.5.0/24, 172.16.6.0/24) into OSPF as Type 7 LSAs. The ABR
! (R3) translates Type 7 to Type 5 and floods into Area 0 and beyond.
!
! Key changes from lab-03 initial config (= lab-02 solution):
!   area 2 nssa -- Internal NSSA router form. Matches R3 (ABR).
!   Loopback1/Loopback2 -- external networks simulating connected ISP
!     routes. NOT added to OSPF via ospfv3 interface commands;
!     advertised only via redistribution.
!   redistribute connected subnets route-map REDIST_EXT -- scoped to
!     only the external loopbacks via prefix-list EXTERNAL_LOOPS.
!     Without route-map scoping, all connected interfaces (transit
!     links, LAN) would also be redistributed, creating duplicate
!     Type 7 LSAs for subnets already in OSPF via network statements.
!
hostname R5
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
 ipv6 address 2001:DB8:FF::5/128
 ospfv3 1 ipv6 area 2
!
interface Loopback1
 description EXTERNAL_SIMULATED_ISP_1
 ip address 172.16.5.1 255.255.255.0
 ipv6 address 2001:DB8:172:5::1/64
 no shutdown
!
interface Loopback2
 description EXTERNAL_SIMULATED_ISP_2
 ip address 172.16.6.1 255.255.255.0
 ipv6 address 2001:DB8:172:6::1/64
 no shutdown
!
interface GigabitEthernet0/0
 description AREA2_R3-Gi0/1
 ip address 10.2.35.2 255.255.255.252
 ip ospf network point-to-point
 ipv6 address FE80::5 link-local
 ipv6 address 2001:DB8:2:35::2/64
 ospfv3 1 ipv6 area 2
 no shutdown
!
interface GigabitEthernet0/1
 description AREA2_PC2-LAN
 ip address 192.168.2.1 255.255.255.0
 ipv6 address FE80::5 link-local
 ipv6 address 2001:DB8:2:2::1/64
 ospfv3 1 ipv6 area 2
 no shutdown
!
ip prefix-list EXTERNAL_LOOPS seq 5 permit 172.16.5.0/24
ip prefix-list EXTERNAL_LOOPS seq 10 permit 172.16.6.0/24
!
ipv6 prefix-list EXTERNAL_LOOPS_V6 seq 5 permit 2001:DB8:172:5::/64
ipv6 prefix-list EXTERNAL_LOOPS_V6 seq 10 permit 2001:DB8:172:6::/64
!
route-map REDIST_EXT permit 10
 match ip address prefix-list EXTERNAL_LOOPS
!
route-map REDIST_EXT_V6 permit 10
 match ipv6 address prefix-list EXTERNAL_LOOPS_V6
!
router ospf 1
 router-id 5.5.5.5
 area 2 nssa
 redistribute connected subnets route-map REDIST_EXT
 passive-interface GigabitEthernet0/1
 network 5.5.5.5 0.0.0.0 area 2
 network 10.2.35.0 0.0.0.3 area 2
 network 192.168.2.0 0.0.0.255 area 2
!
router ospfv3 1
 router-id 5.5.5.5
 !
 address-family ipv6 unicast
  area 2 nssa
  redistribute connected route-map REDIST_EXT_V6
  passive-interface GigabitEthernet0/1
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
