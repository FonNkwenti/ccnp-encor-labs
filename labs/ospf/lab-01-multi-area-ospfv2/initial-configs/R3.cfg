!
! R3 — ABR (Area 0 / Area 2 border) — single-area in lab-00
! Lab 00: Single-Area OSPFv2 Fundamentals — Solution
!
hostname R3
!
no ip domain-lookup
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
interface GigabitEthernet0/0
 description TO_AREA0_BROADCAST_SEGMENT
 ip address 10.0.123.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R5_Gi0/0
 ip address 10.2.35.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router ospf 1
 router-id 3.3.3.3
 network 3.3.3.3 0.0.0.0 area 0
 network 10.0.123.0 0.0.0.255 area 0
 network 10.2.35.0 0.0.0.3 area 0
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
