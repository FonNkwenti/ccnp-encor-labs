!
! R2 -- OSPF Lab 06 -- Capstone II: Comprehensive Troubleshooting (INITIAL/BROKEN)
! FAULT 1: GigabitEthernet0/1 hello/dead timers removed (reverts to default 10s/40s).
!          R4 Gi0/0 retains custom 5s/20s. Hello interval mismatch prevents adjacency.
!
hostname R2
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
 ipv6 address 2001:DB8:FF::2/128
 ospfv3 1 ipv6 area 0
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.2 255.255.255.0
 ip ospf priority 200
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:0:123::2/64
 ospfv3 1 ipv6 area 0
 no shutdown
!
interface GigabitEthernet0/1
 description AREA1_R4-Gi0/0
 ip address 10.1.24.1 255.255.255.252
 ip ospf network point-to-point
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:1:24::1/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
interface GigabitEthernet0/2
 description AREA1_R6-Gi0/0
 ip address 10.1.26.1 255.255.255.252
 ip ospf network point-to-point
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:1:26::1/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
router ospf 1
 router-id 2.2.2.2
 area 1 stub no-summary
 area 1 range 10.1.4.0 255.255.252.0
 area 1 range 10.1.6.0 255.255.255.0 not-advertise
 network 2.2.2.2 0.0.0.0 area 0
 network 10.0.123.0 0.0.0.255 area 0
 network 10.1.24.0 0.0.0.3 area 1
 network 10.1.26.0 0.0.0.3 area 1
!
router ospfv3 1
 router-id 2.2.2.2
 !
 address-family ipv6 unicast
  area 1 stub no-summary
  area 1 range 2001:DB8:1:4::/62
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
