!
! R1 -- Enterprise Edge (AS 65001)
! Lab 00: eBGP Peering Fundamentals -- Solution
! Single eBGP session to R3 (AS 65002). IPv4 only.
!
hostname R1
!
no ip domain-lookup
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
interface Loopback1
 description BGP_ADVERTISED_PREFIX
 ip address 172.16.1.1 255.255.255.0
!
interface GigabitEthernet0/0
 description TO_R2_UNUSED_IN_LAB00
 no ip address
 shutdown
!
interface GigabitEthernet0/1
 description TO_R3
 ip address 10.0.13.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description TO_PC1_LAN
 ip address 192.168.1.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router bgp 65001
 bgp router-id 1.1.1.1
 bgp log-neighbor-changes
 neighbor 10.0.13.2 remote-as 65002
 neighbor 10.0.13.2 description eBGP_TO_R3_AS65002
 !
 address-family ipv4
  network 172.16.1.0 mask 255.255.255.0
  network 192.168.1.0
  neighbor 10.0.13.2 activate
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
