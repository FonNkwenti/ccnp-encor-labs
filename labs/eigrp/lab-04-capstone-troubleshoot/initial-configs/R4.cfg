!
! R4 -- Stub router / PC2 LAN
! Lab 04: Comprehensive Troubleshooting -- Capstone II (BROKEN baseline)
! This is the starting state the student troubleshoots. The correct solution
! is in solutions/R4.cfg. Do not peek.
!
hostname R4
!
no ip domain-lookup
ipv6 unicast-routing
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
 ipv6 address 2001:DB8:FF::4/128
!
interface GigabitEthernet0/0
 description TO_R2
 ip address 10.24.0.2 255.255.255.252
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:24::2/64
 no shutdown
!
interface GigabitEthernet0/1
 description TO_PC2_LAN
 ip address 192.168.2.1 255.255.255.0
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:2:2::1/64
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router eigrp EIGRP-LAB
 !
 address-family ipv4 unicast autonomous-system 100
  af-interface GigabitEthernet0/1
   passive-interface
  exit-af-interface
  eigrp router-id 4.4.4.4
  eigrp stub receive-only
  network 4.4.4.4 0.0.0.0
  network 10.24.0.0 0.0.0.3
  network 192.168.2.0 0.0.0.255
 exit-address-family
 !
 address-family ipv6 unicast autonomous-system 100
  af-interface GigabitEthernet0/1
   passive-interface
  exit-af-interface
  eigrp router-id 4.4.4.4
  eigrp stub connected
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
