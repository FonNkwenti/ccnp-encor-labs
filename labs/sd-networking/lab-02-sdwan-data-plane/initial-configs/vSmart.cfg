system
 host-name vSmart
 system-ip 10.10.10.2
 organization-name ENCOR-LAB
 vbond 172.16.0.3
!
vpn 0
 interface eth1
  ip address 172.16.0.2/24
  tunnel-interface
   encapsulation ipsec
   allow-service all
  !
  no shutdown
 !
 ip route 0.0.0.0/0 172.16.0.254
!
policy
 site-list SITE1
  site-id 100
 !
 site-list SITE2
  site-id 200
 !
 control-policy PREFER-SITE1-PATH
  sequence 10
   match route
    site-list SITE1
   !
   action accept
    set
     preference 200
    !
   !
  !
  default-action accept
 !
!
apply-policy
 site-list SITE2
  control-policy PREFER-SITE1-PATH out
 !
!
