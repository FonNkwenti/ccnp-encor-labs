!
! R3 -- Branch B router (PC1 LAN segment)
! Lab 02: Stub, Summarization, Variance -- Initial config
! Carried forward from Lab 01 solution (named-mode + dual-stack).
! Lo1-Lo4 pre-staged and already enrolled in EIGRP IPv4 AF.
! Student adds summarization + variance-related tuning during the lab.
!
hostname R3
!
no ip domain-lookup
ipv6 unicast-routing
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
 ipv6 address 2001:DB8:FF::3/128
!
interface Loopback1
 description BRANCH_B_SUBNET_1
 ip address 10.3.0.1 255.255.255.0
 ipv6 address 2001:DB8:3:0::1/64
!
interface Loopback2
 description BRANCH_B_SUBNET_2
 ip address 10.3.1.1 255.255.255.0
 ipv6 address 2001:DB8:3:1::1/64
!
interface Loopback3
 description BRANCH_B_SUBNET_3
 ip address 10.3.2.1 255.255.255.0
 ipv6 address 2001:DB8:3:2::1/64
!
interface Loopback4
 description BRANCH_B_SUBNET_4
 ip address 10.3.3.1 255.255.255.0
 ipv6 address 2001:DB8:3:3::1/64
!
interface GigabitEthernet0/0
 description TO_R1
 ip address 10.13.0.2 255.255.255.252
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:13::2/64
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R2
 ip address 10.23.0.2 255.255.255.252
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:23::2/64
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 description TO_PC1_LAN
 ip address 192.168.1.1 255.255.255.0
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:1:1::1/64
 no shutdown
!
no router eigrp 100
!
router eigrp EIGRP-LAB
 !
 address-family ipv4 unicast autonomous-system 100
  af-interface GigabitEthernet0/3
   passive-interface
  exit-af-interface
  eigrp router-id 3.3.3.3
  network 3.3.3.3 0.0.0.0
  network 10.3.0.0 0.0.3.255
  network 10.13.0.0 0.0.0.3
  network 10.23.0.0 0.0.0.3
  network 192.168.1.0 0.0.0.255
 exit-address-family
 !
 address-family ipv6 unicast autonomous-system 100
  af-interface GigabitEthernet0/3
   passive-interface
  exit-af-interface
  eigrp router-id 3.3.3.3
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
