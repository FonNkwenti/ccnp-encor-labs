!
! R3 -- Initial configuration (lab-00 starting point)
! IP addressing pre-loaded; BGP is NOT configured
!
hostname R3
!
no ip domain-lookup
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
interface Loopback1
 description BGP_ADVERTISED_PREFIX
 ip address 172.16.3.1 255.255.255.0
!
interface GigabitEthernet0/0
 description TO_R1
 ip address 10.0.13.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R2_UNUSED_IN_LAB00
 no ip address
 shutdown
!
interface GigabitEthernet0/2
 description TO_R4_UNUSED_IN_LAB00
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
