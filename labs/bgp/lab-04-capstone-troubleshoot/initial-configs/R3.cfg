!
! R3 -- ISP Router (AS 65002)
! Lab 04: Capstone II -- PRE-BROKEN (contains injected faults)
!
hostname R3
!
no ip domain-lookup
ipv6 unicast-routing
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
 ipv6 address 2001:DB8:FF::3/128
!
interface Loopback1
 description BGP_ADVERTISED_PREFIX
 ip address 172.16.3.1 255.255.255.0
 ipv6 address 2001:DB8:172:3::1/64
!
interface GigabitEthernet0/0
 description TO_R1
 ip address 10.0.13.2 255.255.255.252
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:13::2/64
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R2
 ip address 10.0.23.2 255.255.255.252
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:23::2/64
 no shutdown
!
interface GigabitEthernet0/2
 description TO_R4
 ip address 10.0.34.1 255.255.255.252
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:34::1/64
 no shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
ip prefix-list ALL_V4 seq 5 permit 0.0.0.0/0 le 32
!
ipv6 prefix-list ALL_V6 seq 5 permit ::/0 le 128
!
route-map MED_TO_R1 permit 10
 match ip address prefix-list ALL_V4
 set metric 50
!
route-map MED_TO_R2 permit 10
 match ip address prefix-list ALL_V4
 set metric 100
!
route-map MED_V6_TO_R1 permit 10
 match ipv6 address prefix-list ALL_V6
 set metric 50
!
route-map MED_V6_TO_R2 permit 10
 match ipv6 address prefix-list ALL_V6
 set metric 100
!
router bgp 65002
 bgp router-id 3.3.3.3
 bgp log-neighbor-changes
 neighbor 10.0.13.1 remote-as 65001
 neighbor 10.0.13.1 description eBGP_TO_R1_AS65001
 neighbor 10.0.23.1 remote-as 65001
 neighbor 10.0.23.1 description eBGP_TO_R2_AS65001
 neighbor 10.0.34.2 remote-as 65003
 neighbor 10.0.34.2 description eBGP_TO_R4_AS65003
 neighbor 2001:DB8:13::1 remote-as 65001
 neighbor 2001:DB8:13::1 description eBGP_V6_TO_R1_AS65001
 neighbor 2001:DB8:23::1 remote-as 65001
 neighbor 2001:DB8:23::1 description eBGP_V6_TO_R2_AS65001
 neighbor 2001:DB8:34::2 remote-as 65003
 neighbor 2001:DB8:34::2 description eBGP_V6_TO_R4_AS65003
 !
 address-family ipv4
  network 172.16.13.0 mask 255.255.255.0
  neighbor 10.0.13.1 activate
  neighbor 10.0.13.1 route-map MED_TO_R1 out
  neighbor 10.0.23.1 activate
  neighbor 10.0.23.1 route-map MED_TO_R2 out
  neighbor 10.0.34.2 activate
  no neighbor 2001:DB8:13::1 activate
  no neighbor 2001:DB8:23::1 activate
  no neighbor 2001:DB8:34::2 activate
 exit-address-family
 !
 address-family ipv6
  network 2001:DB8:172:3::/64
  no neighbor 10.0.13.1 activate
  no neighbor 10.0.23.1 activate
  no neighbor 10.0.34.2 activate
  neighbor 2001:DB8:13::1 activate
  neighbor 2001:DB8:13::1 route-map MED_V6_TO_R1 out
  neighbor 2001:DB8:23::1 activate
  neighbor 2001:DB8:23::1 route-map MED_V6_TO_R2 out
  neighbor 2001:DB8:34::2 activate
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
