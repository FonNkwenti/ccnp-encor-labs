!
! R1 — Inter-VLAN router (router-on-a-stick)
! Lab 05: Layer 2 Comprehensive Troubleshooting — Capstone II — Pre-broken state
! (R1 is clean — all 6 faults live on the switches)
!
hostname R1
!
no ip domain-lookup
!
interface GigabitEthernet0/0
 description TRUNK_TO_SW1_Gi0/0
 no ip address
 no shutdown
!
interface GigabitEthernet0/0.10
 description GATEWAY_VLAN10_SALES
 encapsulation dot1Q 10
 ip address 192.168.10.1 255.255.255.0
!
interface GigabitEthernet0/0.20
 description GATEWAY_VLAN20_ENGINEERING
 encapsulation dot1Q 20
 ip address 192.168.20.1 255.255.255.0
!
interface GigabitEthernet0/0.30
 description GATEWAY_VLAN30_MGMT_HOSTS
 encapsulation dot1Q 30
 ip address 192.168.30.1 255.255.255.0
!
interface GigabitEthernet0/0.99
 description GATEWAY_VLAN99_NATIVE_MGMT
 encapsulation dot1Q 99 native
 ip address 192.168.99.254 255.255.255.0
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
interface GigabitEthernet0/1
 no ip address
 shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
