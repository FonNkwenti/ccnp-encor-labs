!
! R1 -- Source-side router (iosv)
! Lab 03: Multicast Full Protocol Mastery -- Capstone I (Initial Configuration)
! IP addressing + OSPF only. No multicast (PIM/IGMP/MSDP) pre-configured.
!
hostname R1
!
no ip domain lookup
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
interface GigabitEthernet0/0
 description R1->R2 (L1)
 ip address 10.1.12.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description R1->R3 (L3)
 ip address 10.1.13.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description Source LAN - PC1
 ip address 10.1.1.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 1.1.1.1
 network 1.1.1.1 0.0.0.0 area 0
 network 10.1.12.0 0.0.0.3 area 0
 network 10.1.13.0 0.0.0.3 area 0
 network 10.1.1.0 0.0.0.255 area 0
 passive-interface GigabitEthernet0/2
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
