!
! R3 -- OSPF Lab 02 -- Network Types + DR/BDR Manipulation (SOLUTION)
! ABR between Area 0 (Gi0/0) and Area 2 (Gi0/1). Two network-type
! changes from lab-01:
!   Gi0/0 -- OSPF priority 0. R3 becomes DROTHER on the Area 0 broadcast
!            segment; priority 0 makes R3 ineligible to win DR or BDR
!            regardless of router-ID. DROTHERs still form FULL adjacency
!            with DR/BDR but only 2-WAY with other DROTHERs.
!   Gi0/1 -- OSPF network type point-to-point. Mirrors R5 Gi0/0 for the
!            Area 2 transit so OSPFv2 treats the link as true p2p (no
!            DR/BDR, no Type 2 LSA).
!
hostname R3
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
 ipv6 address 2001:DB8:FF::3/128
 ospfv3 1 ipv6 area 0
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.3 255.255.255.0
 ip ospf priority 0
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:0:123::3/64
 ospfv3 1 ipv6 area 0
 no shutdown
!
interface GigabitEthernet0/1
 description AREA2_R5-Gi0/0
 ip address 10.2.35.1 255.255.255.252
 ip ospf network point-to-point
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:2:35::1/64
 ospfv3 1 ipv6 area 2
 no shutdown
!
router ospf 1
 router-id 3.3.3.3
 network 3.3.3.3 0.0.0.0 area 0
 network 10.0.123.0 0.0.0.255 area 0
 network 10.2.35.0 0.0.0.3 area 2
!
router ospfv3 1
 router-id 3.3.3.3
 !
 address-family ipv6 unicast
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
