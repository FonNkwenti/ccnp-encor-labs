!
! R4 -- OSPF Lab 03 -- Area Types (SOLUTION)
! Internal router in Area 1 (Totally Stubby). R4 connects to ABR R2
! (Gi0/0), the PC1 LAN (Gi0/2), and the new R6 router (Gi0/1).
!
! Key changes from lab-03 initial config (= lab-02 solution):
!   area 1 stub -- Internal router form; no "no-summary" keyword.
!     Signals R4 that Area 1 is stub so it accepts the default-route
!     Type 3 LSA from the ABR instead of needing full inter-area info.
!   Gi0/1 -- new p2p link to R6 (10.1.46.1/30). Adds R6 as an
!     additional internal Area 1 peer.
!
hostname R4
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
 ipv6 address 2001:DB8:FF::4/128
 ospfv3 1 ipv6 area 1
!
interface GigabitEthernet0/0
 description AREA1_R2-Gi0/1
 ip address 10.1.24.2 255.255.255.252
 ip ospf network point-to-point
 ip ospf hello-interval 5
 ip ospf dead-interval 20
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:24::2/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
interface GigabitEthernet0/1
 description AREA1_R6-Gi0/1
 ip address 10.1.46.1 255.255.255.252
 ip ospf network point-to-point
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:46::1/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
interface GigabitEthernet0/2
 description AREA1_PC1-LAN
 ip address 192.168.1.1 255.255.255.0
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:1::1/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
router ospf 1
 router-id 4.4.4.4
 area 1 stub
 passive-interface GigabitEthernet0/2
 network 4.4.4.4 0.0.0.0 area 1
 network 10.1.24.0 0.0.0.3 area 1
 network 10.1.46.0 0.0.0.3 area 1
 network 192.168.1.0 0.0.0.255 area 1
!
router ospfv3 1
 router-id 4.4.4.4
 !
 address-family ipv6 unicast
  area 1 stub
  passive-interface GigabitEthernet0/2
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
