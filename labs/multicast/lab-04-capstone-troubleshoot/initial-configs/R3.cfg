hostname R3
!
no ip domain lookup
ip multicast-routing
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
 ip pim sparse-mode
!
interface GigabitEthernet0/0
 description R3->R2 (L2)
 ip address 10.1.23.2 255.255.255.252
 ip pim sparse-mode
 no shutdown
!
interface GigabitEthernet0/1
 description R3->R1 (L3)
 ip address 10.1.13.2 255.255.255.252
 ip pim sparse-mode
 no shutdown
!
interface GigabitEthernet0/2
 description Receiver LAN - PC2
 ip address 10.1.3.1 255.255.255.0
 ip pim sparse-mode
 ip igmp version 3
 ip igmp join-group 239.1.1.1
 ip igmp join-group 239.2.2.1
 no shutdown
!
interface GigabitEthernet0/3
 description R3->R4 (L7, PIM domain border)
 ip address 10.1.34.2 255.255.255.252
 ip pim sparse-mode
 ip pim bsr-border
 no shutdown
!
router ospf 1
 router-id 3.3.3.3
 network 3.3.3.3 0.0.0.0 area 0
 network 10.1.23.0 0.0.0.3 area 0
 network 10.1.13.0 0.0.0.3 area 0
 network 10.1.3.0 0.0.0.255 area 0
 network 10.1.34.0 0.0.0.3 area 0
 passive-interface GigabitEthernet0/2
!
ip pim bidir-enable
ip pim ssm range SSM_RANGE
!
ip mroute 10.1.1.0 255.255.255.0 4.4.4.4
!
ip access-list standard SSM_RANGE
 permit 232.1.1.0 0.0.0.255
!
end
