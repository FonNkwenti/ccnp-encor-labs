hostname R4
!
no ip domain lookup
ip multicast-routing
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
 ip pim sparse-mode
 ip igmp join-group 239.1.1.1
!
interface GigabitEthernet0/0
 description R4->R2 (L6, PIM domain border)
 ip address 10.1.24.2 255.255.255.252
 ip pim sparse-mode
 ip pim bsr-border
 no shutdown
!
interface GigabitEthernet0/1
 description R4->R3 (L7, PIM domain border)
 ip address 10.1.34.1 255.255.255.252
 ip pim sparse-mode
 ip pim bsr-border
 no shutdown
!
router ospf 1
 router-id 4.4.4.4
 network 4.4.4.4 0.0.0.0 area 0
 network 10.1.24.0 0.0.0.3 area 0
 network 10.1.34.0 0.0.0.3 area 0
!
ip pim bidir-enable
ip pim ssm range SSM_RANGE
ip pim rp-address 4.4.4.4
!
ip access-list standard SSM_RANGE
 permit 232.1.1.0 0.0.0.255
!
ip msdp peer 2.2.2.2 connect-source Loopback0
ip msdp description R2-MSDP-PEER
ip msdp originator-id Loopback0
!
end
