!
! R1 — OSPF Lab 00 — Single-Area OSPFv2 Fundamentals (INITIAL)
! IP addressing pre-loaded. OSPF is NOT configured; the student
! enables the OSPF process and advertises networks into area 0.
!
hostname R1
!
no ip domain-lookup
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.1 255.255.255.0
 no shutdown
!
line vty 0 4
 login
 transport input telnet
!
end
