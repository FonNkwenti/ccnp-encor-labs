!
! R1 -- Primary LAN Gateway (iosv)
! Lab 04: IP Services Full Mastery -- Capstone I (Initial Configuration)
! IP addressing only. No routing protocols, NTP, NAT, or FHRP configured.
! QoS MQC policy pre-loaded for interpretation exercise (Section 5).
!
hostname R1
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
 ipv6 address 2001:DB8:FF::1/128
!
interface GigabitEthernet0/0
 description TO_SW-LAN
 ip address 192.168.1.2 255.255.255.0
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:1:1::2/64
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3_UPLINK
 ip address 10.0.13.1 255.255.255.252
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:13::1/64
 service-policy output LAN-OUT
 no shutdown
!
interface GigabitEthernet0/2
 description TO_R2_DIRECT
 ip address 10.0.12.1 255.255.255.252
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:12::1/64
 no shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
! ===== Pre-loaded QoS MQC policy (students interpret, do not modify) =====
!
class-map match-any VOICE
 match dscp ef
class-map match-any VIDEO
 match dscp af41
class-map match-any CRITICAL-DATA
 match dscp af31
class-map match-any SCAVENGER
 match dscp cs1
!
policy-map LAN-OUT
 class VOICE
  priority percent 10
 class VIDEO
  bandwidth percent 20
  random-detect dscp-based
 class CRITICAL-DATA
  bandwidth percent 30
 class SCAVENGER
  police cir 128000 conform-action transmit exceed-action drop
 class class-default
  fair-queue
  random-detect
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
