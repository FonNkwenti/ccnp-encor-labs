hostname R4
!
ipv6 unicast-routing
!
crypto ikev2 proposal IKEv2-PROP
 encryption aes-cbc-256
 integrity sha256
 group 14
!
crypto ikev2 policy IKEv2-POL
 proposal IKEv2-PROP
!
crypto ikev2 keyring IKEv2-KEYRING
 peer R1
  address 1.1.1.1
  pre-shared-key LAB-PSK-2026
!
crypto ikev2 profile IKEv2-PROFILE
 match identity remote address 1.1.1.1 255.255.255.255
 authentication remote pre-share
 authentication local pre-share
 keyring local IKEv2-KEYRING
!
crypto ipsec transform-set TS-AES256 esp-aes 256 esp-sha256-hmac
 mode tunnel
!
crypto ipsec profile IPSEC-PROFILE
 set transform-set TS-AES256
 set ikev2-profile IKEv2-PROFILE
!
interface Loopback0
 description R4 router-id / tunnel anchor
 ip address 4.4.4.4 255.255.255.255
!
interface Loopback1
 description R4 overlay test prefix (reachable via Tunnel0)
 ip address 10.4.4.4 255.255.255.255
!
interface Tunnel0
 description R4-R1 GRE-over-IPsec (encrypted overlay)
 ip address 172.16.14.2 255.255.255.252
 ipv6 address 2001:db8:14::2/64
 ip mtu 1400
 ip tcp adjust-mss 1360
 tunnel source Loopback0
 tunnel destination 1.1.1.1
 tunnel mode gre ip
 tunnel protection ipsec profile IPSEC-PROFILE
 ip ospf network point-to-point
 no shutdown
!
interface GigabitEthernet0/0
 description R4->R3 WAN underlay (L6)
 ip address 10.0.34.2 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 4.4.4.4
 network 4.4.4.4 0.0.0.0 area 0
 network 10.0.34.0 0.0.0.3 area 0
!
router ospf 2
 router-id 4.4.4.4
 network 172.16.14.0 0.0.0.3 area 0
 network 10.4.4.4 0.0.0.0 area 0
!
end
