!
! R1 — Initial configuration (lab-00 starting point)
! IP addressing pre-loaded; OSPF is NOT configured
!
hostname R1
!
no ip domain-lookup
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
interface GigabitEthernet0/0
 description TO_AREA0_BROADCAST_SEGMENT
 ip address 10.0.123.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 no ip address
 shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
