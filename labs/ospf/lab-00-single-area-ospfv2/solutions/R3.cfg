!
! R3 — OSPF Lab 00 — Single-Area OSPFv2 Fundamentals (SOLUTION)
! Area 0 — participates on the SW-AREA0 shared segment (Gi0/0) and on
! the point-to-point link to R5 (Gi0/1). All interfaces live in area 0
! for this lab; R3 becomes an ABR in lab-01.
!
! R3 wins DR under default priority because its router-ID (3.3.3.3)
! is the highest among R1/R2/R3. Lab-02 manipulates priority to move
! DR to R1.
!
hostname R3
!
no ip domain-lookup
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description AREA0_R5-Gi0/0
 ip address 10.2.35.1 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 3.3.3.3
 network 3.3.3.3 0.0.0.0 area 0
 network 10.0.123.0 0.0.0.255 area 0
 network 10.2.35.0 0.0.0.3 area 0
!
line vty 0 4
 login
 transport input telnet
!
end
