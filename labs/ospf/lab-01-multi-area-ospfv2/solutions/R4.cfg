!
! R4 -- OSPF Lab 01 -- Multi-Area OSPFv2 + Dual-Stack (SOLUTION)
! Internal router in Area 1. Every R4 interface lives in Area 1 now
! (Loopback0, Gi0/0 to R2, Gi0/2 to PC1). Gi0/2 stays passive to
! prevent hellos toward PC1 while still advertising 192.168.1.0/24.
!
! Matching hello/dead timers on Gi0/0 align with R2 Gi0/1 -- carried
! over from lab-00.
!
! OSPFv3 IPv6 address-family: all three interfaces -> Area 1;
! passive-interface mirrored on Gi0/2 inside the IPv6 AF.
!
hostname R4
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
 ipv6 address 2001:DB8:FF::4/128
 ospfv3 1 ipv6 area 1
!
interface GigabitEthernet0/0
 description AREA1_R2-Gi0/1
 ip address 10.1.24.2 255.255.255.252
 ip ospf hello-interval 5
 ip ospf dead-interval 20
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:24::2/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
interface GigabitEthernet0/2
 description AREA1_PC1-LAN
 ip address 192.168.1.1 255.255.255.0
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:1::1/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
router ospf 1
 router-id 4.4.4.4
 passive-interface GigabitEthernet0/2
 network 4.4.4.4 0.0.0.0 area 1
 network 10.1.24.0 0.0.0.3 area 1
 network 192.168.1.0 0.0.0.255 area 1
!
router ospfv3 1
 router-id 4.4.4.4
 !
 address-family ipv6 unicast
  passive-interface GigabitEthernet0/2
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
