hostname R2
no ip domain-lookup
!
!
vrf definition CUSTOMER-A
 rd 65001:100
 !
 address-family ipv4
 exit-address-family
 !
 address-family ipv6
 exit-address-family
!
vrf definition CUSTOMER-B
 rd 65001:200
 !
 address-family ipv4
 exit-address-family
 !
 address-family ipv6
 exit-address-family
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
interface Loopback1
 vrf forwarding CUSTOMER-B
 ip address 172.20.2.1 255.255.255.0
 ipv6 address 2001:db8:b2::1/64
!
interface Loopback2
 vrf forwarding CUSTOMER-B
 ip address 192.168.2.100 255.255.255.0
!
interface GigabitEthernet0/0
 description R2->R3 WAN underlay
 ip address 10.0.23.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/0.100
 description R2->R3 VRF CUSTOMER-A transit
 encapsulation dot1Q 100
 vrf forwarding CUSTOMER-A
 ip address 172.16.23.1 255.255.255.252
 ipv6 address 2001:db8:ca23::1/64
!
interface GigabitEthernet0/1
 description R2->R1 direct underlay
 ip address 10.0.12.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description R2 LAN - CUSTOMER-A site 2
 vrf forwarding CUSTOMER-A
 ip address 192.168.2.1 255.255.255.0
 ipv6 address 2001:db8:a2::1/64
 no shutdown
!
router ospf 1
 router-id 2.2.2.2
 network 2.2.2.2 0.0.0.0 area 0
 network 10.0.23.0 0.0.0.3 area 0
 network 10.0.12.0 0.0.0.3 area 0
!
ip route vrf CUSTOMER-A 192.168.1.0 255.255.255.0 172.16.23.2
!
ipv6 route vrf CUSTOMER-A 2001:db8:a1::/64 2001:db8:ca23::2
!
end
