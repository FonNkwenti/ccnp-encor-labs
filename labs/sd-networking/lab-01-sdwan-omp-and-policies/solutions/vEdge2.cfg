system
 host-name vEdge2
 system-ip 10.10.10.12
 site-id 200
 organization-name ENCOR-LAB
 vbond 172.16.0.3
!
vpn 0
 interface ge0/0
  ip address 172.16.2.1/24
  tunnel-interface
   encapsulation ipsec
   allow-service all
  !
  no shutdown
 !
 ip route 0.0.0.0/0 172.16.2.254
!
vpn 1
 interface ge0/1
  ip address 192.168.2.1/24
  no shutdown
 !
