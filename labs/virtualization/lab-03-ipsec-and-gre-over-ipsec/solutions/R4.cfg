hostname R4
!
ipv6 unicast-routing
!
crypto ikev2 proposal IKEv2-PROP
 encryption aes-cbc-256
 integrity sha256
 group 14
!
crypto ikev2 policy IKEv2-POL
 proposal IKEv2-PROP
!
crypto ikev2 keyring IKEv2-KEYRING
 peer R1
  address 10.10.1.1
  pre-shared-key LAB-PSK-2026
!
crypto ikev2 profile IKEv2-PROFILE
 match identity remote address 10.10.1.1 255.255.255.255
 authentication remote pre-share
 authentication local pre-share
 keyring local IKEv2-KEYRING
!
crypto ipsec transform-set TS-AES256 esp-aes 256 esp-sha256-hmac
 mode tunnel
!
crypto ipsec profile IPSEC-PROFILE
 set transform-set TS-AES256
 set ikev2-profile IKEv2-PROFILE
!
interface Loopback0
 description R4 router-id / Tunnel0 anchor
 ip address 4.4.4.4 255.255.255.255
!
interface Loopback10
 description R4 IPsec tunnel anchor (dedicated to encrypted overlays)
 ip address 10.10.4.4 255.255.255.255
!
interface Loopback1
 description R4 overlay test network (reachable via plain GRE Tunnel0)
 ip address 10.4.4.4 255.255.255.255
!
interface Loopback2
 description R4 IPsec VTI test prefix (reachable via Tunnel1 static)
 ip address 10.4.4.5 255.255.255.255
!
interface Loopback3
 description R4 GRE-over-IPsec test prefix (reachable via Tunnel2 OSPF)
 ip address 10.4.4.6 255.255.255.255
!
interface Tunnel0
 description R4-R1 GRE Tunnel (plain overlay)
 ip address 172.16.14.2 255.255.255.252
 ipv6 address 2001:db8:14::2/64
 ip mtu 1400
 ip tcp adjust-mss 1360
 tunnel source Loopback0
 tunnel destination 1.1.1.1
 tunnel mode gre ip
 ip ospf network point-to-point
 no shutdown
!
interface Tunnel1
 description R4-R1 IPsec VTI (encrypted, no multicast)
 ip address 172.16.15.2 255.255.255.252
 tunnel source Loopback10
 tunnel destination 10.10.1.1
 tunnel mode ipsec ipv4
 tunnel protection ipsec profile IPSEC-PROFILE
 no shutdown
!
interface Tunnel2
 description R4-R1 GRE-over-IPsec (encrypted + multicast)
 ip address 172.16.16.2 255.255.255.252
 ipv6 address 2001:db8:16::2/64
 ip mtu 1400
 ip tcp adjust-mss 1360
 tunnel source Loopback10
 tunnel destination 10.10.1.1
 tunnel mode gre ip
 tunnel protection ipsec profile IPSEC-PROFILE
 ip ospf network point-to-point
 no shutdown
!
interface GigabitEthernet0/0
 description R4->R3 WAN underlay (L6)
 ip address 10.0.34.2 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 4.4.4.4
 network 4.4.4.4 0.0.0.0 area 0
 network 10.10.4.4 0.0.0.0 area 0
 network 10.0.34.0 0.0.0.3 area 0
!
router ospf 2
 router-id 4.4.4.4
 network 172.16.14.0 0.0.0.3 area 0
 network 10.4.4.4 0.0.0.0 area 0
!
router ospf 3
 router-id 4.4.4.4
 network 172.16.16.0 0.0.0.3 area 0
 network 10.4.4.6 0.0.0.0 area 0
!
end
