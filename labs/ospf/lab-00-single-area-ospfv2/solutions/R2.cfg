!
! R2 — OSPF Lab 00 — Single-Area OSPFv2 Fundamentals (SOLUTION)
! Area 0 — participates on the SW-AREA0 shared segment (Gi0/0) and on
! the point-to-point link to R4 (Gi0/1). All interfaces live in area 0
! for this lab; R2 becomes an ABR in lab-01.
!
! Custom hello/dead timers on the R2-R4 link (Gi0/1) demonstrate
! objective 8 (timer tuning). Values must match on R4 Gi0/0.
!
hostname R2
!
no ip domain-lookup
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.2 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description AREA0_R4-Gi0/0
 ip address 10.1.24.1 255.255.255.252
 ip ospf hello-interval 5
 ip ospf dead-interval 20
 no shutdown
!
router ospf 1
 router-id 2.2.2.2
 network 2.2.2.2 0.0.0.0 area 0
 network 10.0.123.0 0.0.0.255 area 0
 network 10.1.24.0 0.0.0.3 area 0
!
line vty 0 4
 login
 transport input telnet
!
end
