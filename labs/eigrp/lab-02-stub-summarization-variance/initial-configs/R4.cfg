!
! R4 -- Stub router (PC2 LAN segment)
! Lab 02: Stub, Summarization, Variance -- Initial config (IP addressing only)
! Student adds named-mode EIGRP + stub configuration during the lab.
!
hostname R4
!
no ip domain-lookup
ipv6 unicast-routing
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
 ipv6 address 2001:DB8:FF::4/128
!
interface GigabitEthernet0/0
 description TO_R2
 ip address 10.24.0.2 255.255.255.252
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:24::2/64
 no shutdown
!
interface GigabitEthernet0/1
 description TO_PC2_LAN
 ip address 192.168.2.1 255.255.255.0
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:2:2::1/64
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
