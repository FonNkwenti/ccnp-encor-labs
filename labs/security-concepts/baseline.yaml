    folder: lab-00-security-design
    title: "Network Security Design and Components"
    difficulty: Foundation
    type: progressive
    format: reference
    time_minutes: 60
    devices: []
    blueprint_refs: ["5.3", "5.4", "5.4.a", "5.4.b", "5.4.c", "5.4.d"]
    objectives:
      - Describe REST API security mechanisms — Basic Auth, token-based, OAuth, HTTPS
      - Explain the Cisco SAFE security framework and architectural PINs
      - Identify threat defense components — IPS/IDS, Talos, Threat Grid
      - Describe endpoint security — Cisco Secure Endpoint, posture assessment, Umbrella
      - Compare traditional firewall vs NGFW — application awareness, identity policies
      - Explain TrustSec SGT-based segmentation and SGACL policy enforcement
      - Describe MACsec (802.1AE) operation and MKA key management
      - Answer exam-style questions on security design components
    notes: >
      Reference workbook. Architecture diagrams for SAFE framework,
      TrustSec SGT flow, MACsec packet format. API security comparison
      table. Quiz-style questions aligned to 350-401 exam.

