!
! SW2 — Access switch (PC1 segment) / primary root for VLAN 20
! Lab 04: Layer 2 Full Configuration — Capstone I — Solution
!
hostname SW2
!
no ip domain-lookup
!
vlan 10
 name SALES
vlan 20
 name ENGINEERING
vlan 30
 name MANAGEMENT_HOSTS
vlan 99
 name NATIVE_MGMT
!
! --- Spanning Tree: Rapid PVST+, SW2 root for VLAN 20, secondary for 10/30/99 ---
spanning-tree mode rapid-pvst
spanning-tree vlan 20 priority 4096
spanning-tree vlan 10,30,99 priority 28672
!
port-channel load-balance src-dst-mac
!
! --- Spare (no connection) ---
interface GigabitEthernet0/0
 shutdown
!
! --- Po1 members: SW2 <-> SW1 (LACP passive) ---
interface GigabitEthernet0/1
 description PO1_MEMBER_TO_SW1_Gi0/1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 channel-group 1 mode passive
 no shutdown
!
interface GigabitEthernet0/2
 description PO1_MEMBER_TO_SW1_Gi0/2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 channel-group 1 mode passive
 no shutdown
!
! --- Po3 members: SW2 <-> SW3 (static — mode on) ---
interface GigabitEthernet0/3
 description PO3_MEMBER_TO_SW3_Gi0/1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 channel-group 3 mode on
 no shutdown
!
interface GigabitEthernet1/0
 description PO3_MEMBER_TO_SW3_Gi0/2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 channel-group 3 mode on
 no shutdown
!
! --- Port-channel 1 (LACP — SW2 <-> SW1) ---
interface Port-channel1
 description LACP_PO1_TO_SW1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 no shutdown
!
! --- Port-channel 3 (Static — SW2 <-> SW3) ---
interface Port-channel3
 description STATIC_PO3_TO_SW3
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 no shutdown
!
! --- Access port for PC1 (VLAN 10) — PortFast + BPDU guard ---
interface GigabitEthernet1/1
 description ACCESS_PC1_VLAN10
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 spanning-tree bpduguard enable
 no shutdown
!
! --- Spare interfaces ---
interface GigabitEthernet1/2
 shutdown
!
interface GigabitEthernet1/3
 shutdown
!
! --- Management SVI ---
interface Vlan99
 description MANAGEMENT
 ip address 192.168.99.2 255.255.255.0
 no shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
