!
! R1 -- OSPF Lab 05 -- Capstone I: Full Protocol Mastery (SOLUTION)
! Backbone router (Area 0 only). Distribute-list filters 10.1.5.0/24
! from the local RIB using a prefix-list applied inbound under OSPF.
!
hostname R1
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
 ipv6 address 2001:DB8:FF::1/128
 ospfv3 1 ipv6 area 0
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.1 255.255.255.0
 ip ospf priority 255
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:0:123::1/64
 ospfv3 1 ipv6 area 0
 no shutdown
!
ip prefix-list BLOCK_10_1_5 seq 5 deny 10.1.5.0/24
ip prefix-list BLOCK_10_1_5 seq 10 permit 0.0.0.0/0 le 32
!
router ospf 1
 router-id 1.1.1.1
 distribute-list prefix BLOCK_10_1_5 in
 network 1.1.1.1 0.0.0.0 area 0
 network 10.0.123.0 0.0.0.255 area 0
!
router ospfv3 1
 router-id 1.1.1.1
 !
 address-family ipv6 unicast
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
