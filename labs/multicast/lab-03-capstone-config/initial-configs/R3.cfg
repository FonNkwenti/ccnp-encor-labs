!
! R3 -- Receiver-side router (iosv)
! Lab 03: Multicast Full Protocol Mastery -- Capstone I (Initial Configuration)
! IP addressing + OSPF only. No multicast (PIM/IGMP/MSDP) pre-configured.
!
hostname R3
!
no ip domain lookup
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
interface GigabitEthernet0/0
 description R3->R2 (L2)
 ip address 10.1.23.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description R3->R1 (L3)
 ip address 10.1.13.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description Receiver LAN - PC2
 ip address 10.1.3.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/3
 description R3->R4 (L7, PIM domain border)
 ip address 10.1.34.2 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 3.3.3.3
 network 3.3.3.3 0.0.0.0 area 0
 network 10.1.23.0 0.0.0.3 area 0
 network 10.1.13.0 0.0.0.3 area 0
 network 10.1.3.0 0.0.0.255 area 0
 network 10.1.34.0 0.0.0.3 area 0
 passive-interface GigabitEthernet0/2
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
