hostname R3
!
no ip domain-lookup
ip domain-name encor-lab.local
!
username admin privilege 15 secret Encor-API-2026
!
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
!
event manager session cli username admin
!
event manager applet SYSLOG-MONITOR
 event syslog pattern "OSPF-NONEXISTENT-PATTERN"
 action 1.0 syslog msg "EEM: OSPF adjacency change detected"
 action 2.0 cli command "enable"
 action 3.0 cli command "show ip ospf neighbor"
!
! FAULT 3: SYSLOG-MONITOR pattern is "OSPF-NONEXISTENT-PATTERN" instead of "OSPF-5-ADJCHG"
! Applet is registered but will never trigger on real OSPF events
!
event manager applet BACKUP-CONFIG
 event timer cron cron-entry "0 0 * * *"
 action 1.0 cli command "enable"
 action 2.0 cli command "copy running-config startup-config" pattern "filename"
 action 3.0 cli command ""
 action 4.0 syslog msg "EEM: Nightly config backup completed"
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
interface GigabitEthernet0/0
 description To R2
 ip address 10.1.23.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description To PC2
 ip address 192.168.20.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 3.3.3.3
 passive-interface GigabitEthernet0/1
 network 3.3.3.3 0.0.0.0 area 0
 network 10.1.23.0 0.0.0.3 area 0
 network 192.168.20.0 0.0.0.255 area 0
!
line console 0
 login local
 exec-timeout 10 0
 logging synchronous
!
line vty 0 4
 login local
 transport input ssh
 exec-timeout 5 0
!
end
