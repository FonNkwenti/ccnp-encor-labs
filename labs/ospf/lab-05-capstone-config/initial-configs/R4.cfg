!
! R4 -- OSPF Lab 05 -- Capstone I (INITIAL CONFIG)
! IP addressing only. No routing protocol configuration.
! Students configure OSPF from scratch.
!
hostname R4
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
 ipv6 address 2001:DB8:FF::4/128
 no shutdown
!
interface Loopback1
 description SUMMARIZATION_TARGET_1
 ip address 10.1.4.1 255.255.255.0
 ipv6 address 2001:DB8:1:4::1/64
 no shutdown
!
interface Loopback2
 description SUMMARIZATION_TARGET_2
 ip address 10.1.5.1 255.255.255.0
 ipv6 address 2001:DB8:1:5::1/64
 no shutdown
!
interface Loopback3
 description SUMMARIZATION_TARGET_3
 ip address 10.1.6.1 255.255.255.0
 ipv6 address 2001:DB8:1:6::1/64
 no shutdown
!
interface Loopback4
 description SUMMARIZATION_TARGET_4
 ip address 10.1.7.1 255.255.255.0
 ipv6 address 2001:DB8:1:7::1/64
 no shutdown
!
interface GigabitEthernet0/0
 description AREA1_R2-Gi0/1
 ip address 10.1.24.2 255.255.255.252
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:24::2/64
 no shutdown
!
interface GigabitEthernet0/1
 description AREA1_R6-Gi0/1
 ip address 10.1.46.1 255.255.255.252
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:46::1/64
 no shutdown
!
interface GigabitEthernet0/2
 description AREA1_PC1-LAN
 ip address 192.168.1.1 255.255.255.0
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:1::1/64
 no shutdown
!
line vty 0 4
 login
 transport input telnet
!
end
