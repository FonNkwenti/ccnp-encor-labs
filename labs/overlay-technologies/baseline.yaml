    blueprint_refs: ["2.3", "2.3.a", "2.3.b"]
    objectives:
      - Explain LISP architecture — EID, RLOC, ITR, ETR, MS, MR
      - Trace a LISP packet flow from Map-Request to encapsulated delivery
      - Describe VXLAN encapsulation — MAC-in-UDP, VNI, VTEP
      - Analyze a VXLAN packet header and calculate encapsulation overhead
      - Compare flood-and-learn with BGP EVPN as VXLAN control planes
      - Explain how LISP and VXLAN work together in SD-Access
      - Interpret sample show commands for LISP and VXLAN (reference output)
      - Answer exam-style questions on network virtualization concepts
    notes: >
      Reference workbook. Packet format diagrams for LISP and VXLAN
      encapsulation. Show-command interpretation from reference outputs
      (not live devices). Cross-references sd-networking topic for
      SD-Access context.

  - number: 2
    folder: lab-02-capstone-review
    title: "Virtualization Concepts Comprehensive Review"
    type: capstone_i
    clean_slate: true
    format: reference
    difficulty: Advanced
    time_minutes: 60
    devices: []
    blueprint_refs: all
    objectives:
      - Complete a comprehensive review covering all virtualization concepts
      - Answer scenario-based questions combining device and network virtualization
      - Analyze a campus fabric diagram identifying LISP, VXLAN, and VTEP roles
      - Compare hypervisor types for a given data center deployment scenario
