!
! R4 — OSPF Lab 00 — Single-Area OSPFv2 Fundamentals (INITIAL)
! IP addressing pre-loaded on Gi0/0 (uplink to R2) and Gi0/2 (PC1 LAN).
! OSPF is NOT configured; the student enables OSPF, sets the PC1 LAN
! interface to passive, and tunes hello/dead timers on Gi0/0 to match R2.
!
hostname R4
!
no ip domain-lookup
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
!
interface GigabitEthernet0/0
 description AREA0_R2-Gi0/1
 ip address 10.1.24.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description AREA0_PC1-LAN
 ip address 192.168.1.1 255.255.255.0
 no shutdown
!
line vty 0 4
 login
 transport input telnet
!
end
