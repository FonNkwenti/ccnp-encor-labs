topic: multicast
lab_number: 3
folder: lab-03-capstone-config
title: "Multicast Full Protocol Mastery — Capstone I"
type: capstone_i
difficulty: Advanced
time_minutes: 120
clean_slate: true
initial_configs_source: >
  baseline.yaml core_topology (IP addressing + OSPF only). All four routers are
  underlay-ready (including the L6/L7 border links for R4) but multicast is
  fully absent — no ip multicast-routing, no PIM, no RP, no SSM/Bidir/MSDP.
  Student builds the entire multicast stack from scratch.
blueprint_refs:
  - all
devices:
  - R1
  - R2
  - R3
  - R4
  - PC1
  - PC2
objectives:
  - Configure PIM-SM on all interfaces across all four routers from scratch
  - Implement BSR-based RP discovery with R2 as BSR candidate and RP candidate
  - Configure SSM for 232.1.1.0/24 with IGMPv3 on the receiver interface
  - Configure Bidirectional PIM for 239.2.2.0/24 (R2 as bidir RP candidate)
  - Establish MSDP peering between R2 and R4 with originator-id on Loopback0
  - Fence the two PIM domains with ip pim bsr-border on the four inter-domain interfaces
  - Static RP self-reference on R4 for its single-router PIM domain
  - Verify end-to-end multicast forwarding for all three modes (ASM, SSM, bidir)
  - Verify RPF checks, (S,G) and (*,G) entries, and DF elections on every segment
end_state:
  rp_primary: 2.2.2.2 (R2 Lo0 — BSR RP for 239.1.1.0/24 ASM + 239.2.2.0/24 Bidir)
  rp_secondary: 4.4.4.4 (R4 Lo0 — static RP for its own single-router PIM domain)
  rp_discovery_main_domain: BSR
  pim_domain_border: R2 Gi0/2, R3 Gi0/3, R4 Gi0/0, R4 Gi0/1
  ssm_range: 232.1.1.0/24
  bidir_range: 239.2.2.0/24
  asm_range: 239.1.1.0/24
  igmp_version_on_receiver_lan: 3
  static_joins:
    R3 Gi0/2: [239.1.1.1 (ASM), 239.2.2.1 (Bidir), 232.1.1.1 source 10.1.1.10 (SSM)]
    R4 Lo0: [239.1.1.1 (MSDP SA demo)]
  msdp_peers:
    - R2 Lo0 (2.2.2.2) <-> R4 Lo0 (4.4.4.4)
fault_scenarios:
  - scenario_01: R3 Gi0/1 loses ip pim sparse-mode — ASM SPT to R1 fails; only shared tree via R2 works
  - scenario_02: R2 Gi0/2 loses ip pim bsr-border — BSR leaks into R4's PIM domain
  - scenario_03: R2 loses ip msdp originator-id Loopback0 — MSDP session stays Up but R4 SA cache stays empty
