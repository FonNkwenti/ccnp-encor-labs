!
! R4 — OSPF Lab 00 — Single-Area OSPFv2 Fundamentals (SOLUTION)
! Area 0 — participates on Gi0/0 (to R2) and Gi0/2 (PC1 LAN). The LAN
! is passive to prevent hellos toward the host while still advertising
! 192.168.1.0/24 into OSPF. R4 becomes an Area 1 internal router in
! lab-01.
!
! Matching hello/dead timers on Gi0/0 to align with R2 Gi0/1 (objective
! 8 — timer tuning).
!
hostname R4
!
no ip domain-lookup
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
!
interface GigabitEthernet0/0
 description AREA0_R2-Gi0/1
 ip address 10.1.24.2 255.255.255.252
 ip ospf hello-interval 5
 ip ospf dead-interval 20
 no shutdown
!
interface GigabitEthernet0/2
 description AREA0_PC1-LAN
 ip address 192.168.1.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 4.4.4.4
 passive-interface GigabitEthernet0/2
 network 4.4.4.4 0.0.0.0 area 0
 network 10.1.24.0 0.0.0.3 area 0
 network 192.168.1.0 0.0.0.255 area 0
!
line vty 0 4
 login
 transport input telnet
!
end
