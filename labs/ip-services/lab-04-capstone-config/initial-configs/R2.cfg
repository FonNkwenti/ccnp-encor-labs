!
! R2 -- Secondary LAN Gateway (iosv)
! Lab 04: IP Services Full Mastery -- Capstone I (Initial Configuration)
! IP addressing only. No routing protocols, NTP, or FHRP configured.
!
hostname R2
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
 ipv6 address 2001:DB8:FF::2/128
!
interface GigabitEthernet0/0
 description TO_SW-LAN
 ip address 192.168.1.3 255.255.255.0
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:1:1::3/64
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3_UPLINK
 ip address 10.0.23.1 255.255.255.252
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:23::1/64
 no shutdown
!
interface GigabitEthernet0/2
 description TO_R1_DIRECT
 ip address 10.0.12.2 255.255.255.252
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:12::2/64
 no shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
