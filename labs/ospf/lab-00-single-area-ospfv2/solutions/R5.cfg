!
! R5 — OSPF Lab 00 — Single-Area OSPFv2 Fundamentals (SOLUTION)
! Area 0 — participates on Gi0/0 (to R3) and Gi0/1 (PC2 LAN). The LAN
! is passive to prevent hellos toward the host while still advertising
! 192.168.2.0/24 into OSPF. R5 becomes the ASBR in lab-03 (NSSA).
!
hostname R5
!
no ip domain-lookup
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
!
interface GigabitEthernet0/0
 description AREA0_R3-Gi0/1
 ip address 10.2.35.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description AREA0_PC2-LAN
 ip address 192.168.2.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 5.5.5.5
 passive-interface GigabitEthernet0/1
 network 5.5.5.5 0.0.0.0 area 0
 network 10.2.35.0 0.0.0.3 area 0
 network 192.168.2.0 0.0.0.255 area 0
!
line vty 0 4
 login
 transport input telnet
!
end
