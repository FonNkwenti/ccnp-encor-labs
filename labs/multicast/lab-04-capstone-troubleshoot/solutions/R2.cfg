hostname R2
!
no ip domain lookup
ip multicast-routing
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
 ip pim sparse-mode
!
interface GigabitEthernet0/0
 description R2->R1 (L1)
 ip address 10.1.12.2 255.255.255.252
 ip pim sparse-mode
 no shutdown
!
interface GigabitEthernet0/1
 description R2->R3 (L2)
 ip address 10.1.23.1 255.255.255.252
 ip pim sparse-mode
 no shutdown
!
interface GigabitEthernet0/2
 description R2->R4 (L6, PIM domain border)
 ip address 10.1.24.1 255.255.255.252
 ip pim sparse-mode
 ip pim bsr-border
 no shutdown
!
router ospf 1
 router-id 2.2.2.2
 network 2.2.2.2 0.0.0.0 area 0
 network 10.1.12.0 0.0.0.3 area 0
 network 10.1.23.0 0.0.0.3 area 0
 network 10.1.24.0 0.0.0.3 area 0
!
ip pim bidir-enable
ip pim ssm range SSM_RANGE
ip pim bsr-candidate Loopback0 0
ip pim rp-candidate Loopback0 group-list ASM_GROUPS
ip pim rp-candidate Loopback0 group-list BIDIR_GROUPS bidir
!
ip access-list standard SSM_RANGE
 permit 232.1.1.0 0.0.0.255
ip access-list standard ASM_GROUPS
 permit 239.1.1.0 0.0.0.255
ip access-list standard BIDIR_GROUPS
 permit 239.2.2.0 0.0.0.255
!
ip msdp peer 4.4.4.4 connect-source Loopback0
ip msdp description R4-MSDP-PEER
ip msdp originator-id Loopback0
!
end
