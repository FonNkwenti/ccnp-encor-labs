!
! R1 -- Hub router (EIGRP core)
! Lab 00: Classic EIGRP Fundamentals -- Solution
! Classic EIGRP mode (router eigrp 100). Triangle core member.
!
hostname R1
!
no ip domain-lookup
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
interface GigabitEthernet0/0
 description TO_R2
 ip address 10.12.0.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3
 ip address 10.13.0.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router eigrp 100
 eigrp router-id 1.1.1.1
 network 1.1.1.1 0.0.0.0
 network 10.12.0.0 0.0.0.3
 network 10.13.0.0 0.0.0.3
 no auto-summary
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
