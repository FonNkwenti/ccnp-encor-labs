!
! R1 -- Router-on-a-stick (full OTS config is baseline; student does not touch R1)
! Lab 03 MST -- Initial baseline
!
hostname R1
!
no ip domain-lookup
!
interface Loopback0
 description ROUTER_ID
 ip address 1.1.1.1 255.255.255.255
!
interface GigabitEthernet0/0
 description TRUNK_TO_SW1_Gi0/0
 no ip address
 no shutdown
!
interface GigabitEthernet0/0.10
 description VLAN10_SALES
 encapsulation dot1Q 10
 ip address 192.168.10.1 255.255.255.0
!
interface GigabitEthernet0/0.20
 description VLAN20_ENGINEERING
 encapsulation dot1Q 20
 ip address 192.168.20.1 255.255.255.0
!
interface GigabitEthernet0/0.30
 description VLAN30_MANAGEMENT_HOSTS
 encapsulation dot1Q 30
 ip address 192.168.30.1 255.255.255.0
!
interface GigabitEthernet0/0.99
 description VLAN99_NATIVE_MGMT
 encapsulation dot1Q 99 native
 ip address 192.168.99.254 255.255.255.0
!
interface GigabitEthernet0/1
 shutdown
!
interface GigabitEthernet0/2
 shutdown
!
interface GigabitEthernet0/3
 shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
 transport input ssh telnet
!
end
