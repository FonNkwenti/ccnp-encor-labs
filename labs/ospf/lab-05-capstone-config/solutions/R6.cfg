!
! R6 -- OSPF Lab 05 -- Capstone I: Full Protocol Mastery (SOLUTION)
! Internal router in Area 1 (Totally Stubby). Gi0/0 connects to R2,
! Gi0/1 connects to R4. Both links are point-to-point OSPF.
!
hostname R6
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 6.6.6.6 255.255.255.255
 ipv6 address 2001:DB8:FF::6/128
 ospfv3 1 ipv6 area 1
!
interface GigabitEthernet0/0
 description AREA1_R2-Gi0/2
 ip address 10.1.26.2 255.255.255.252
 ip ospf network point-to-point
 ipv6 address FE80::6 link-local
 ipv6 address 2001:DB8:1:26::2/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
interface GigabitEthernet0/1
 description AREA1_R4-Gi0/1
 ip address 10.1.46.2 255.255.255.252
 ip ospf network point-to-point
 ipv6 address FE80::6 link-local
 ipv6 address 2001:DB8:1:46::2/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
router ospf 1
 router-id 6.6.6.6
 area 1 stub
 network 6.6.6.6 0.0.0.0 area 1
 network 10.1.26.0 0.0.0.3 area 1
 network 10.1.46.0 0.0.0.3 area 1
!
router ospfv3 1
 router-id 6.6.6.6
 !
 address-family ipv6 unicast
  area 1 stub
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
