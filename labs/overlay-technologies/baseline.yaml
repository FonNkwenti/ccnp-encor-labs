labs:
  - number: 0
    folder: lab-00-device-virtualization
    title: "Device Virtualization — Hypervisors, VMs, and Virtual Switching"
    difficulty: Foundation
    type: progressive
    format: reference
    time_minutes: 45
    devices: []
    blueprint_refs: ["2.1", "2.1.a", "2.1.b", "2.1.c"]
    objectives:
      - Compare Type 1 and Type 2 hypervisors with examples and use cases
      - Describe virtual machine architecture — vCPU, vRAM, vNIC, vDisk
      - Compare VMs and containers — isolation model, resource usage, startup time
      - Explain standard vSwitch vs distributed vSwitch operation
      - Describe performance optimizations — DPDK, SR-IOV, PCI passthrough
      - Identify when to use each optimization technique
      - Answer exam-style questions on device virtualization concepts
    notes: >
      Reference workbook. Architecture diagrams showing hypervisor
      layers, VM structure, and vSwitch packet flow. Quiz-style
      questions aligned to 350-401 exam format.

  - number: 1
    folder: lab-01-lisp-and-vxlan
    title: "LISP and VXLAN Network Virtualization Concepts"
    difficulty: Intermediate
    type: progressive
    format: reference
    time_minutes: 60
