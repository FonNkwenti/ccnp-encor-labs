hostname R4
!
ipv6 unicast-routing
!
interface Loopback0
 description R4 router-id / tunnel anchor
 ip address 4.4.4.4 255.255.255.255
!
interface Loopback1
 description R4 overlay test network (reachable only via GRE tunnel)
 ip address 10.4.4.4 255.255.255.255
!
interface Tunnel0
 description R4-R1 GRE Tunnel (overlay)
 ip address 172.16.14.2 255.255.255.252
 ipv6 address 2001:db8:14::2/64
 ip mtu 1400
 ip tcp adjust-mss 1360
 tunnel source Loopback0
 tunnel destination 1.1.1.1
 ip ospf network point-to-point
 no shutdown
!
interface GigabitEthernet0/0
 description R4->R3 WAN underlay (L6)
 ip address 10.0.34.2 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 4.4.4.4
 network 4.4.4.4 0.0.0.0 area 0
 network 10.0.34.0 0.0.0.3 area 0
!
router ospf 2
 router-id 4.4.4.4
 network 172.16.14.0 0.0.0.3 area 0
 network 10.4.4.4 0.0.0.0 area 0
!
end
