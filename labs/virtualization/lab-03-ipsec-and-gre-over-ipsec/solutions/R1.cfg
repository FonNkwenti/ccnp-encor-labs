hostname R1
!
vrf definition CUSTOMER-A
 rd 65001:100
 !
 address-family ipv4
 exit-address-family
 !
 address-family ipv6
 exit-address-family
!
vrf definition CUSTOMER-B
 rd 65001:200
 !
 address-family ipv4
 exit-address-family
 !
 address-family ipv6
 exit-address-family
!
ipv6 unicast-routing
!
crypto ikev2 proposal IKEv2-PROP
 encryption aes-cbc-256
 integrity sha256
 group 14
!
crypto ikev2 policy IKEv2-POL
 proposal IKEv2-PROP
!
crypto ikev2 keyring IKEv2-KEYRING
 peer R4
  address 4.4.4.4
  pre-shared-key LAB-PSK-2026
!
crypto ikev2 profile IKEv2-PROFILE
 match identity remote address 4.4.4.4 255.255.255.255
 authentication remote pre-share
 authentication local pre-share
 keyring local IKEv2-KEYRING
!
crypto ipsec transform-set TS-AES256 esp-aes 256 esp-sha256-hmac
 mode tunnel
!
crypto ipsec profile IPSEC-PROFILE
 set transform-set TS-AES256
 set ikev2-profile IKEv2-PROFILE
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
interface Loopback1
 vrf forwarding CUSTOMER-B
 ip address 172.20.1.1 255.255.255.0
 ipv6 address 2001:db8:b1::1/64
!
interface Loopback2
 vrf forwarding CUSTOMER-B
 ip address 192.168.1.100 255.255.255.0
!
interface Tunnel0
 description R1-R4 GRE Tunnel (plain overlay)
 ip address 172.16.14.1 255.255.255.252
 ipv6 address 2001:db8:14::1/64
 ip mtu 1400
 ip tcp adjust-mss 1360
 tunnel source Loopback0
 tunnel destination 4.4.4.4
 tunnel mode gre ip
 ip ospf network point-to-point
 no shutdown
!
interface Tunnel1
 description R1-R4 IPsec VTI (encrypted, no multicast)
 ip address 172.16.15.1 255.255.255.252
 tunnel source Loopback0
 tunnel destination 4.4.4.4
 tunnel mode ipsec ipv4
 tunnel protection ipsec profile IPSEC-PROFILE
 no shutdown
!
interface Tunnel2
 description R1-R4 GRE-over-IPsec (encrypted + multicast)
 ip address 172.16.16.1 255.255.255.252
 ipv6 address 2001:db8:16::1/64
 ip mtu 1400
 ip tcp adjust-mss 1360
 tunnel source Loopback0
 tunnel destination 4.4.4.4
 tunnel mode gre ip
 tunnel protection ipsec profile IPSEC-PROFILE
 ip ospf network point-to-point
 no shutdown
!
interface GigabitEthernet0/0
 description R1->R3 WAN underlay
 ip address 10.0.13.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/0.100
 description R1->R3 VRF CUSTOMER-A transit
 encapsulation dot1Q 100
 vrf forwarding CUSTOMER-A
 ip address 172.16.13.1 255.255.255.252
 ipv6 address 2001:db8:ca13::1/64
!
interface GigabitEthernet0/1
 description R1->R2 direct underlay
 ip address 10.0.12.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description R1 LAN - CUSTOMER-A site 1
 vrf forwarding CUSTOMER-A
 ip address 192.168.1.1 255.255.255.0
 ipv6 address 2001:db8:a1::1/64
 no shutdown
!
router ospf 1
 router-id 1.1.1.1
 network 1.1.1.1 0.0.0.0 area 0
 network 10.0.13.0 0.0.0.3 area 0
 network 10.0.12.0 0.0.0.3 area 0
!
router ospf 2
 router-id 1.1.1.1
 network 172.16.14.0 0.0.0.3 area 0
!
router ospf 3
 router-id 1.1.1.1
 network 172.16.16.0 0.0.0.3 area 0
!
ip route 10.4.4.5 255.255.255.255 172.16.15.2
!
ip route vrf CUSTOMER-A 192.168.2.0 255.255.255.0 172.16.13.2
!
ipv6 route vrf CUSTOMER-A 2001:db8:a2::/64 2001:db8:ca13::2
!
! Inter-VRF leaking: /32 host routes beat the connected /24 in CUSTOMER-B (Lo2)
ip route vrf CUSTOMER-B 192.168.1.1 255.255.255.255 GigabitEthernet0/2 192.168.1.1
ip route vrf CUSTOMER-A 172.20.1.1 255.255.255.255 Loopback1 172.20.1.1
!
end
