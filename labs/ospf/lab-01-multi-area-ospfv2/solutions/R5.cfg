!
! R5 -- OSPF Lab 01 -- Multi-Area OSPFv2 + Dual-Stack (SOLUTION)
! Internal router in Area 2. Every R5 interface lives in Area 2 now
! (Loopback0, Gi0/0 to R3, Gi0/1 to PC2). Gi0/1 stays passive to
! prevent hellos toward PC2 while still advertising 192.168.2.0/24.
!
! R5 becomes the NSSA ASBR in lab-03 -- Loopback1/2 aren't configured
! here yet (they appear when Area 2 is converted to NSSA).
!
! OSPFv3 IPv6 address-family: all three interfaces -> Area 2;
! passive-interface mirrored on Gi0/1 inside the IPv6 AF.
!
hostname R5
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
 ipv6 address 2001:DB8:FF::5/128
 ospfv3 1 ipv6 area 2
!
interface GigabitEthernet0/0
 description AREA2_R3-Gi0/1
 ip address 10.2.35.2 255.255.255.252
 ipv6 address FE80::5 link-local
 ipv6 address 2001:DB8:2:35::2/64
 ospfv3 1 ipv6 area 2
 no shutdown
!
interface GigabitEthernet0/1
 description AREA2_PC2-LAN
 ip address 192.168.2.1 255.255.255.0
 ipv6 address FE80::5 link-local
 ipv6 address 2001:DB8:2:2::1/64
 ospfv3 1 ipv6 area 2
 no shutdown
!
router ospf 1
 router-id 5.5.5.5
 passive-interface GigabitEthernet0/1
 network 5.5.5.5 0.0.0.0 area 2
 network 10.2.35.0 0.0.0.3 area 2
 network 192.168.2.0 0.0.0.255 area 2
!
router ospfv3 1
 router-id 5.5.5.5
 !
 address-family ipv6 unicast
  passive-interface GigabitEthernet0/1
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
