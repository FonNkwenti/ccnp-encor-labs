!
! R6 -- OSPF Lab 03 -- Area Types (INITIAL CONFIG)
! New router introduced in lab-03. IP addressing only -- no OSPF.
! R6 is an internal Area 1 router connected to both ABR R2 (via Gi0/0)
! and internal router R4 (via Gi0/1). The student configures the OSPF
! stub area type and brings up the adjacencies.
!
hostname R6
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 6.6.6.6 255.255.255.255
 ipv6 address 2001:DB8:FF::6/128
 no shutdown
!
interface GigabitEthernet0/0
 description AREA1_R2-Gi0/2
 ip address 10.1.26.2 255.255.255.252
 ipv6 address FE80::6 link-local
 ipv6 address 2001:DB8:1:26::2/64
 no shutdown
!
interface GigabitEthernet0/1
 description AREA1_R4-Gi0/1
 ip address 10.1.46.2 255.255.255.252
 ipv6 address FE80::6 link-local
 ipv6 address 2001:DB8:1:46::2/64
 no shutdown
!
line vty 0 4
 login
 transport input telnet
!
end
