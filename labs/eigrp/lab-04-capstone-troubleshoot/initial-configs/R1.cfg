!
! R1 -- Hub router (EIGRP core)
! Lab 04: Comprehensive Troubleshooting -- Capstone II (BROKEN baseline)
! This is the starting state the student troubleshoots. The correct solution
! is in solutions/R1.cfg. Do not peek.
!
! NOTE: The router boots with concurrent faults injected across the domain.
! Each fault is isolated to its target device; this file may or may not
! contain one of those faults. The student works from symptoms only.
!
hostname R1
!
no ip domain-lookup
ipv6 unicast-routing
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
 ipv6 address 2001:DB8:FF::1/128
!
interface GigabitEthernet0/0
 description TO_R2
 ip address 10.12.0.1 255.255.255.252
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:12::1/64
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3
 ip address 10.13.0.1 255.255.255.252
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:13::1/64
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router eigrp EIGRP-LAB
 !
 address-family ipv4 unicast autonomous-system 100
  eigrp router-id 1.1.1.1
  metric weights 0 2 0 1 0 0
  network 1.1.1.1 0.0.0.0
  network 10.12.0.0 0.0.0.3
  network 10.13.0.0 0.0.0.3
 exit-address-family
 !
 address-family ipv6 unicast autonomous-system 100
  eigrp router-id 1.1.1.1
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
