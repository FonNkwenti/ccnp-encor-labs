!
! SW3 — Access switch (PC2 segment) / secondary root for VLAN 20
! Lab 05: Layer 2 Comprehensive Troubleshooting — Capstone II — Pre-broken state
!
! Faults present on SW3:
!   F1 — Po2 (and member Gi0/3,Gi1/0) native VLAN 1 instead of 99
!   F3 — Gi0/3 channel-group mode passive (LACP) instead of auto (PAgP)
!   F5 — Gi1/1 (PC2) administratively shutdown (simulated BPDU-guard err-disable)
!
hostname SW3
!
no ip domain-lookup
!
vlan 10
 name SALES
vlan 20
 name ENGINEERING
vlan 30
 name MANAGEMENT_HOSTS
vlan 99
 name NATIVE_MGMT
!
spanning-tree mode rapid-pvst
spanning-tree vlan 20 priority 28672
!
port-channel load-balance src-dst-mac
!
interface GigabitEthernet0/0
 shutdown
!
interface GigabitEthernet0/1
 description PO3_MEMBER_TO_SW2_Gi0/3
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 channel-group 3 mode on
 no shutdown
!
interface GigabitEthernet0/2
 description PO3_MEMBER_TO_SW2_Gi1/0
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 channel-group 3 mode on
 no shutdown
!
interface GigabitEthernet0/3
 description PO2_MEMBER_TO_SW1_Gi0/3
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 1
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 channel-group 2 mode passive
 no shutdown
!
interface GigabitEthernet1/0
 description PO2_MEMBER_TO_SW1_Gi1/0
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 1
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 channel-group 2 mode auto
 no shutdown
!
interface Port-channel2
 description PAGP_PO2_TO_SW1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 1
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 no shutdown
!
interface Port-channel3
 description STATIC_PO3_TO_SW2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 no shutdown
!
interface GigabitEthernet1/1
 description ACCESS_PC2_VLAN20
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 spanning-tree bpduguard enable
 shutdown
!
interface GigabitEthernet1/2
 shutdown
!
interface GigabitEthernet1/3
 shutdown
!
interface Vlan99
 description MANAGEMENT
 ip address 192.168.99.3 255.255.255.0
 no shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
