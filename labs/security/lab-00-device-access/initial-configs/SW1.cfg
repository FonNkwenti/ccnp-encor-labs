hostname SW1
!
no ip domain-lookup
!
enable secret cisco
!
vlan 10
 name TRUSTED
!
vlan 20
 name UNTRUSTED
!
vlan 99
 name MGMT
!
interface GigabitEthernet0/1
 description To R1
 switchport mode access
 switchport access vlan 10
 no shutdown
!
interface GigabitEthernet0/2
 description To R2
 switchport mode access
 switchport access vlan 20
 no shutdown
!
interface GigabitEthernet0/3
 description To PC1
 switchport mode access
 switchport access vlan 10
 no shutdown
!
interface GigabitEthernet1/0
 description To PC2
 switchport mode access
 switchport access vlan 20
 no shutdown
!
interface Vlan99
 description Management
 ip address 192.168.99.11 255.255.255.0
 no shutdown
!
line console 0
 logging synchronous
!
line vty 0 4
 password cisco
 login
!
end
