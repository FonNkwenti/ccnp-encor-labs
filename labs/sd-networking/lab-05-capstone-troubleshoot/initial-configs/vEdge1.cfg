system
 host-name vEdge1
 system-ip 10.10.10.11
 site-id 100
 organization-name ENCOR-LAB
 vbond 172.16.0.99
!
vpn 0
 interface ge0/0
  ip address 172.16.1.1/24
  tunnel-interface
   encapsulation ipsec
   allow-service all
  !
  no shutdown
 !
 ip route 0.0.0.0/0 172.16.1.254
!
vpn 1
 interface ge0/1
  ip address 192.168.1.1/24
  no shutdown
 !
