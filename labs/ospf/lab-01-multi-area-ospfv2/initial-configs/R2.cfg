!
! R2 — ABR (Area 0 / Area 1 border) — single-area in lab-00
! Lab 00: Single-Area OSPFv2 Fundamentals — Solution
!
hostname R2
!
no ip domain-lookup
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
interface GigabitEthernet0/0
 description TO_AREA0_BROADCAST_SEGMENT
 ip address 10.0.123.2 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R4_Gi0/0
 ip address 10.1.24.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router ospf 1
 router-id 2.2.2.2
 network 2.2.2.2 0.0.0.0 area 0
 network 10.0.123.0 0.0.0.255 area 0
 network 10.1.24.0 0.0.0.3 area 0
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
