!
! R2 -- OSPF Lab 02 -- Network Types + DR/BDR Manipulation (SOLUTION)
! ABR between Area 0 (Gi0/0) and Area 1 (Gi0/1). Two network-type
! changes from lab-01:
!   Gi0/0 -- OSPF priority 200. R2 becomes BDR on the Area 0 broadcast
!            segment (R1=255 wins DR; R3=0 is ineligible).
!   Gi0/1 -- OSPF network type point-to-point. The /30 transit to R4
!            already behaves like a p2p link logically; this aligns the
!            OSPF state. On ethernet, converting to p2p skips DR/BDR
!            election and removes the Type 2 LSA, but default hello/dead
!            timers stay 10/40 (unlike serial p2p). Existing 5/20 timers
!            from lab-00 persist unchanged -- still must match on R4.
!
hostname R2
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
 ipv6 address 2001:DB8:FF::2/128
 ospfv3 1 ipv6 area 0
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.2 255.255.255.0
 ip ospf priority 200
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:0:123::2/64
 ospfv3 1 ipv6 area 0
 no shutdown
!
interface GigabitEthernet0/1
 description AREA1_R4-Gi0/0
 ip address 10.1.24.1 255.255.255.252
 ip ospf network point-to-point
 ip ospf hello-interval 5
 ip ospf dead-interval 20
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:1:24::1/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
router ospf 1
 router-id 2.2.2.2
 network 2.2.2.2 0.0.0.0 area 0
 network 10.0.123.0 0.0.0.255 area 0
 network 10.1.24.0 0.0.0.3 area 1
!
router ospfv3 1
 router-id 2.2.2.2
 !
 address-family ipv6 unicast
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
