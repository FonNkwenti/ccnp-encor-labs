    platform: iosv
    role: "Internal router"
  - name: R5
    platform: iosv
    role: "Future ASBR"
  - name: SW-AREA0
    platform: unmanaged_switch
    role: "Shared broadcast segment"
  - name: PC1
    type: vpc
  - name: PC2
    type: vpc

