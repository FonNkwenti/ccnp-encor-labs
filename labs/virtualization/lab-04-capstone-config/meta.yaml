  - Protect the GRE tunnel with IPsec using IKEv2 (GRE-over-IPsec)
  - Verify end-to-end reachability — PC1 to PC2 via VRF, R1 to R4 via encrypted tunnel
  - Demonstrate VRF isolation, tunnel overlay vs underlay, and IPsec SA status
