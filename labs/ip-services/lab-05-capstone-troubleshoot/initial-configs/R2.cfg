!
! R2 -- Secondary LAN Gateway (iosv)
! Lab 05: IP Services Comprehensive Troubleshooting -- Capstone II
! PRE-BROKEN: Contains 2 embedded faults (Faults 4, 5).
!   Fault 4: NTP authentication key-string mismatch (NTP_KEY_WRONG instead of NTP_KEY_1)
!   Fault 5: VRRPv3 IPv6 address-family missing on Gi0/0 (no IPv6 gateway redundancy)
!
hostname R2
!
no ip domain-lookup
!
ipv6 unicast-routing
fhrp version vrrp v3
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
 ipv6 address 2001:DB8:FF::2/128
 ip ospf 1 area 0
 ipv6 ospf 1 area 0
!
interface GigabitEthernet0/0
 description TO_SW-LAN
 ip address 192.168.1.3 255.255.255.0
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:1:1::3/64
 ipv6 ospf 1 area 0
 ip ospf 1 area 0
 vrrp 1 address-family ipv4
  address 192.168.1.1 primary
  priority 100
  preempt
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3_UPLINK
 ip address 10.0.23.1 255.255.255.252
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:23::1/64
 ipv6 ospf 1 area 0
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/2
 description TO_R1_DIRECT
 ip address 10.0.12.2 255.255.255.252
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:12::2/64
 ipv6 ospf 1 area 0
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router ospf 1
 router-id 2.2.2.2
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2
!
ipv6 router ospf 1
 router-id 2.2.2.2
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2
!
ntp authentication-key 1 md5 NTP_KEY_WRONG
ntp authenticate
ntp trusted-key 1
ntp server 1.1.1.1 key 1
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
