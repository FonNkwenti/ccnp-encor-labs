!
! R1 -- Primary LAN Gateway (iosv)
! Lab 01: Static NAT, Dynamic NAT, and PAT -- Initial Config
! (= Lab 00 solution: OSPF + NTP master + QoS MQC pre-loaded)
!
hostname R1
!
no ip domain-lookup
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
 ip ospf 1 area 0
!
interface GigabitEthernet0/0
 description TO_SW-LAN
 ip address 192.168.1.2 255.255.255.0
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3_UPLINK
 ip address 10.0.13.1 255.255.255.252
 ip ospf 1 area 0
 service-policy output LAN-OUT
 no shutdown
!
interface GigabitEthernet0/2
 description TO_R2_DIRECT
 ip address 10.0.12.1 255.255.255.252
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router ospf 1
 router-id 1.1.1.1
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2
!
class-map match-any VOICE
 match dscp ef
class-map match-any VIDEO
 match dscp af41
class-map match-any CRITICAL-DATA
 match dscp af31
class-map match-any SCAVENGER
 match dscp cs1
!
policy-map LAN-OUT
 class VOICE
  priority percent 10
 class VIDEO
  bandwidth percent 20
  random-detect dscp-based
 class CRITICAL-DATA
  bandwidth percent 30
 class SCAVENGER
  police cir 128000 conform-action transmit exceed-action drop
 class class-default
  fair-queue
  random-detect
!
ntp authentication-key 1 md5 NTP_KEY_1
ntp authenticate
ntp trusted-key 1
ntp master 3
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
