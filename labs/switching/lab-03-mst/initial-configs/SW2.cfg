!
! SW2 -- Access switch (PC1 segment)
! Lab 03 MST -- Initial baseline
!
hostname SW2
!
no ip domain-lookup
!
vlan 10
 name SALES
vlan 20
 name ENGINEERING
vlan 30
 name MANAGEMENT_HOSTS
vlan 99
 name NATIVE_MGMT
!
spanning-tree mode rapid-pvst
!
! --- Trunks to SW1 ---
interface GigabitEthernet0/1
 description TRUNK_TO_SW1_Gi0/1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 no shutdown
!
interface GigabitEthernet0/2
 description TRUNK_TO_SW1_Gi0/2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 no shutdown
!
! --- Trunks to SW3 ---
interface GigabitEthernet0/3
 description TRUNK_TO_SW3_Gi0/1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 no shutdown
!
interface GigabitEthernet1/0
 description TRUNK_TO_SW3_Gi0/2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 no shutdown
!
! --- PC1 access port ---
interface GigabitEthernet1/1
 description ACCESS_TO_PC1_VLAN10
 switchport mode access
 switchport access vlan 10
 no shutdown
!
! --- Spare interfaces ---
interface GigabitEthernet0/0
 shutdown
!
interface GigabitEthernet1/2
 shutdown
!
interface GigabitEthernet1/3
 shutdown
!
! --- Management SVI ---
interface Vlan99
 description MANAGEMENT
 ip address 192.168.99.2 255.255.255.0
 no shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
