!
! R1 -- Hub router (EIGRP core)
! Lab 04: Comprehensive Troubleshooting -- Capstone II (known-good reference)
! Named mode dual-stack EIGRP. R1 is the core: two neighbors (R2, R3),
! receives the 10.3.0.0/22 + 2001:DB8:3::/62 summaries from R3, and reaches
! R4 / PC2 transitively through R2.
!
hostname R1
!
no ip domain-lookup
ipv6 unicast-routing
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
 ipv6 address 2001:DB8:FF::1/128
!
interface GigabitEthernet0/0
 description TO_R2
 ip address 10.12.0.1 255.255.255.252
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:12::1/64
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3
 ip address 10.13.0.1 255.255.255.252
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:13::1/64
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router eigrp EIGRP-LAB
 !
 address-family ipv4 unicast autonomous-system 100
  eigrp router-id 1.1.1.1
  network 1.1.1.1 0.0.0.0
  network 10.12.0.0 0.0.0.3
  network 10.13.0.0 0.0.0.3
 exit-address-family
 !
 address-family ipv6 unicast autonomous-system 100
  eigrp router-id 1.1.1.1
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
