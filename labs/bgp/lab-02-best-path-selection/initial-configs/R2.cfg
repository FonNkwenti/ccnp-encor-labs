!
! R2 -- Enterprise Edge 2 (AS 65001)
! Lab 01: iBGP, Dual-Homing, and Dual-Stack -- Solution
! iBGP to R1 via Loopback0. eBGP to R3 (IPv4+IPv6 dual-stack).
!
hostname R2
!
no ip domain-lookup
ipv6 unicast-routing
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
 ipv6 address 2001:DB8:FF::2/128
 ipv6 ospf 1 area 0
!
interface GigabitEthernet0/0
 description TO_R1_INTERNAL
 ip address 10.0.12.2 255.255.255.252
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:12::2/64
 ipv6 ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3
 ip address 10.0.23.1 255.255.255.252
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:23::1/64
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router ospf 1
 router-id 2.2.2.2
 passive-interface default
 no passive-interface GigabitEthernet0/0
 network 2.2.2.2 0.0.0.0 area 0
 network 10.0.12.0 0.0.0.3 area 0
!
ipv6 router ospf 1
 router-id 2.2.2.2
 passive-interface default
 no passive-interface GigabitEthernet0/0
!
router bgp 65001
 bgp router-id 2.2.2.2
 bgp log-neighbor-changes
 neighbor 1.1.1.1 remote-as 65001
 neighbor 1.1.1.1 description iBGP_TO_R1
 neighbor 1.1.1.1 update-source Loopback0
 neighbor 10.0.23.2 remote-as 65002
 neighbor 10.0.23.2 description eBGP_TO_R3_AS65002
 neighbor 2001:DB8:23::2 remote-as 65002
 neighbor 2001:DB8:23::2 description eBGP_V6_TO_R3_AS65002
 neighbor 2001:DB8:FF::1 remote-as 65001
 neighbor 2001:DB8:FF::1 description iBGP_V6_TO_R1
 neighbor 2001:DB8:FF::1 update-source Loopback0
 !
 address-family ipv4
  neighbor 1.1.1.1 activate
  neighbor 1.1.1.1 next-hop-self
  neighbor 10.0.23.2 activate
  no neighbor 2001:DB8:23::2 activate
  no neighbor 2001:DB8:FF::1 activate
 exit-address-family
 !
 address-family ipv6
  no neighbor 10.0.23.2 activate
  neighbor 2001:DB8:23::2 activate
  neighbor 2001:DB8:FF::1 activate
  neighbor 2001:DB8:FF::1 next-hop-self
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
