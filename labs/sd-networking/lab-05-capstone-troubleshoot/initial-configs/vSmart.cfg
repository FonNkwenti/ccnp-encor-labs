system
 host-name vSmart
 system-ip 10.10.10.2
 organization-name ENCOR-LAB
 vbond 172.16.0.3
!
vpn 0
 interface eth1
  ip address 172.16.0.2/24
  tunnel-interface
   encapsulation ipsec
   allow-service all
  !
  no shutdown
 !
 ip route 0.0.0.0/0 172.16.0.254
!
policy
 site-list SITE1
  site-id 100
 !
 site-list SITE2
  site-id 200
 !
 vpn-list VPN1
  vpn 2
 !
 sla-class DEFAULT
  loss    5
  latency 150
  jitter  30
 !
 control-policy PREFER-SITE1-PATH
  sequence 10
   match route
    site-list SITE1
   !
   action accept
    set
     preference 200
    !
   !
  !
  default-action accept
 !
 app-route-policy APP-AWARE-ROUTING
  vpn-list VPN1
   sequence 10
    match
     source-ip 0.0.0.0/0
     destination-ip 0.0.0.0/0
    !
    action sla-class DEFAULT
     preferred-color default
    !
   !
  !
 !
!
