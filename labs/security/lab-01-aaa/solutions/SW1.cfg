hostname SW1
!
no ip domain-lookup
ip domain-name encor-lab.local
enable secret Encor-Enable-2026
!
username admin privilege 15 secret Encor-Admin-2026
username operator privilege 7 secret Encor-Oper-2026
!
privilege exec level 7 show ip interface brief
privilege exec level 7 show interfaces
privilege exec level 7 show ip route
privilege exec level 7 ping
privilege exec level 7 traceroute
!
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
ip ssh source-interface Vlan99
!
vlan 10
 name TRUSTED
!
vlan 20
 name UNTRUSTED
!
vlan 99
 name MGMT
!
interface GigabitEthernet0/1
 description To R1
 switchport mode access
 switchport access vlan 10
 no shutdown
!
interface GigabitEthernet0/2
 description To R2
 switchport mode access
 switchport access vlan 20
 no shutdown
!
interface GigabitEthernet0/3
 description To PC1
 switchport mode access
 switchport access vlan 10
 no shutdown
!
interface GigabitEthernet1/0
 description To PC2
 switchport mode access
 switchport access vlan 20
 no shutdown
!
interface Vlan99
 description Management
 ip address 192.168.99.11 255.255.255.0
 no shutdown
!
line console 0
 login local
 exec-timeout 10 0
 logging synchronous
!
line vty 0 4
 login local
 transport input ssh
 exec-timeout 5 0
!
end
