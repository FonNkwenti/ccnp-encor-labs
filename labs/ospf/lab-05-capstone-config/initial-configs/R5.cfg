!
! R5 -- OSPF Lab 05 -- Capstone I (INITIAL CONFIG)
! IP addressing only. No routing protocol configuration.
! Students configure OSPF, redistribution, and summarization from scratch.
!
hostname R5
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
 ipv6 address 2001:DB8:FF::5/128
 no shutdown
!
interface Loopback1
 description EXTERNAL_SIMULATED_ISP_1
 ip address 172.16.5.1 255.255.255.0
 ipv6 address 2001:DB8:172:5::1/64
 no shutdown
!
interface Loopback2
 description EXTERNAL_SIMULATED_ISP_2
 ip address 172.16.6.1 255.255.255.0
 ipv6 address 2001:DB8:172:6::1/64
 no shutdown
!
interface GigabitEthernet0/0
 description AREA2_R3-Gi0/1
 ip address 10.2.35.2 255.255.255.252
 ipv6 address FE80::5 link-local
 ipv6 address 2001:DB8:2:35::2/64
 no shutdown
!
interface GigabitEthernet0/1
 description AREA2_PC2-LAN
 ip address 192.168.2.1 255.255.255.0
 ipv6 address FE80::5 link-local
 ipv6 address 2001:DB8:2:2::1/64
 no shutdown
!
line vty 0 4
 login
 transport input telnet
!
end
