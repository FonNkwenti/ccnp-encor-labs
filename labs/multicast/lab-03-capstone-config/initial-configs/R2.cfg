!
! R2 -- Primary RP domain hub + MSDP speaker (iosv)
! Lab 03: Multicast Full Protocol Mastery -- Capstone I (Initial Configuration)
! IP addressing + OSPF only. No multicast (PIM/IGMP/MSDP) pre-configured.
!
hostname R2
!
no ip domain lookup
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
interface GigabitEthernet0/0
 description R2->R1 (L1)
 ip address 10.1.12.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description R2->R3 (L2)
 ip address 10.1.23.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description R2->R4 (L6, PIM domain border)
 ip address 10.1.24.1 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 2.2.2.2
 network 2.2.2.2 0.0.0.0 area 0
 network 10.1.12.0 0.0.0.3 area 0
 network 10.1.23.0 0.0.0.3 area 0
 network 10.1.24.0 0.0.0.3 area 0
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
