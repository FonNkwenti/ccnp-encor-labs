lab:
  number: 0
  folder: lab-00-vlans-and-trunking
  title: "VLANs and Trunk Negotiation"
  topic: switching
  exam: "350-401"
  difficulty: Foundation
  type: progressive
  time_minutes: 60
  blueprint_refs: ["3.1", "3.1.a"]

devices:
  - name: SW1
    platform: iosvl2
    role: "Distribution switch / root bridge candidate"
  - name: SW2
    platform: iosvl2
    role: "Access switch (PC1 segment)"
  - name: SW3
    platform: iosvl2
    role: "Access switch (PC2 segment)"
  - name: R1
    platform: iosv
    role: "Inter-VLAN router (router-on-a-stick)"
  - name: PC1
    type: vpc
    vlan: 10
  - name: PC2
    type: vpc
    vlan: 20

files:
  workbook: workbook.md
  topology: topology.drawio
  setup_script: setup_lab.py
  initial_configs:
    - initial-configs/SW1.cfg
    - initial-configs/SW2.cfg
    - initial-configs/SW3.cfg
    - initial-configs/R1.cfg
  solutions:
    - solutions/SW1.cfg
    - solutions/SW2.cfg
    - solutions/SW3.cfg
    - solutions/R1.cfg
  fault_injection:
    - scripts/fault-injection/inject_scenario_01.py
    - scripts/fault-injection/inject_scenario_02.py
    - scripts/fault-injection/inject_scenario_03.py
    - scripts/fault-injection/apply_solution.py
    - scripts/fault-injection/README.md

troubleshooting_scenarios: 3

