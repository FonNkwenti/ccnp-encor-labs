!
! R1 -- Enterprise Edge 1 (AS 65001)
! Lab 01: iBGP, Dual-Homing, and Dual-Stack -- Solution
! iBGP to R2 via Loopback0. eBGP to R3 (IPv4+IPv6 dual-stack).
!
hostname R1
!
no ip domain-lookup
ipv6 unicast-routing
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
 ipv6 address 2001:DB8:FF::1/128
 ipv6 ospf 1 area 0
!
interface Loopback1
 description BGP_ADVERTISED_PREFIX
 ip address 172.16.1.1 255.255.255.0
 ipv6 address 2001:DB8:172:1::1/64
!
interface GigabitEthernet0/0
 description TO_R2_INTERNAL
 ip address 10.0.12.1 255.255.255.252
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:12::1/64
 ipv6 ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3
 ip address 10.0.13.1 255.255.255.252
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:13::1/64
 no shutdown
!
interface GigabitEthernet0/2
 description TO_PC1_LAN
 ip address 192.168.1.1 255.255.255.0
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:1:1::1/64
 no shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router ospf 1
 router-id 1.1.1.1
 passive-interface default
 no passive-interface GigabitEthernet0/0
 network 1.1.1.1 0.0.0.0 area 0
 network 10.0.12.0 0.0.0.3 area 0
!
ipv6 router ospf 1
 router-id 1.1.1.1
 passive-interface default
 no passive-interface GigabitEthernet0/0
!
router bgp 65001
 bgp router-id 1.1.1.1
 bgp log-neighbor-changes
 neighbor 2.2.2.2 remote-as 65001
 neighbor 2.2.2.2 description iBGP_TO_R2
 neighbor 2.2.2.2 update-source Loopback0
 neighbor 10.0.13.2 remote-as 65002
 neighbor 10.0.13.2 description eBGP_TO_R3_AS65002
 neighbor 2001:DB8:13::2 remote-as 65002
 neighbor 2001:DB8:13::2 description eBGP_V6_TO_R3_AS65002
 neighbor 2001:DB8:FF::2 remote-as 65001
 neighbor 2001:DB8:FF::2 description iBGP_V6_TO_R2
 neighbor 2001:DB8:FF::2 update-source Loopback0
 !
 address-family ipv4
  network 172.16.1.0 mask 255.255.255.0
  network 192.168.1.0
  neighbor 2.2.2.2 activate
  neighbor 2.2.2.2 next-hop-self
  neighbor 10.0.13.2 activate
  no neighbor 2001:DB8:13::2 activate
  no neighbor 2001:DB8:FF::2 activate
 exit-address-family
 !
 address-family ipv6
  network 2001:DB8:172:1::/64
  network 2001:DB8:1:1::/64
  neighbor 10.0.13.2 activate
  no neighbor 10.0.13.2 activate
  neighbor 2001:DB8:13::2 activate
  neighbor 2001:DB8:FF::2 activate
  neighbor 2001:DB8:FF::2 next-hop-self
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
