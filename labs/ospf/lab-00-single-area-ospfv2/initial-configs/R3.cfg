!
! R3 — OSPF Lab 00 — Single-Area OSPFv2 Fundamentals (INITIAL)
! IP addressing pre-loaded on both interfaces. OSPF is NOT configured;
! the student enables OSPF so R3 can participate on the shared segment
! and win DR under default priority.
!
hostname R3
!
no ip domain-lookup
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description AREA0_R5-Gi0/0
 ip address 10.2.35.1 255.255.255.252
 no shutdown
!
line vty 0 4
 login
 transport input telnet
!
end
