!
! R1 — OSPF Lab 00 — Single-Area OSPFv2 Fundamentals (SOLUTION)
! Area 0 backbone router. Participates on the SW-AREA0 shared segment
! only. Highest-router-ID loses DR to R3 under default priority — this
! becomes the setup for DR/BDR manipulation in lab-02.
!
hostname R1
!
no ip domain-lookup
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 1.1.1.1
 network 1.1.1.1 0.0.0.0 area 0
 network 10.0.123.0 0.0.0.255 area 0
!
line vty 0 4
 login
 transport input telnet
!
end
