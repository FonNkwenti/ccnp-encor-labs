!
! R2 -- OSPF Lab 01 -- Multi-Area OSPFv2 + Dual-Stack (SOLUTION)
! ABR between Area 0 (Gi0/0 on shared segment + Loopback0) and Area 1
! (Gi0/1 to R4). Custom hello/dead timers on Gi0/1 carry over from
! lab-00 -- these must still match on R4 Gi0/0.
!
! OSPFv3 IPv6 address-family mirrors the OSPFv2 area map:
!   Loopback0 + Gi0/0 -> Area 0
!   Gi0/1            -> Area 1
!
hostname R2
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
 ipv6 address 2001:DB8:FF::2/128
 ospfv3 1 ipv6 area 0
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.2 255.255.255.0
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:0:123::2/64
 ospfv3 1 ipv6 area 0
 no shutdown
!
interface GigabitEthernet0/1
 description AREA1_R4-Gi0/0
 ip address 10.1.24.1 255.255.255.252
 ip ospf hello-interval 5
 ip ospf dead-interval 20
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:1:24::1/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
router ospf 1
 router-id 2.2.2.2
 network 2.2.2.2 0.0.0.0 area 0
 network 10.0.123.0 0.0.0.255 area 0
 network 10.1.24.0 0.0.0.3 area 1
!
router ospfv3 1
 router-id 2.2.2.2
 !
 address-family ipv6 unicast
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
