!
! R2 — OSPF Lab 00 — Single-Area OSPFv2 Fundamentals (INITIAL)
! IP addressing pre-loaded on both interfaces. OSPF is NOT configured;
! the student enables OSPF and tunes hello/dead timers on Gi0/1 to
! match R4 (objective 8 — timer tuning).
!
hostname R2
!
no ip domain-lookup
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.2 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description AREA0_R4-Gi0/0
 ip address 10.1.24.1 255.255.255.252
 no shutdown
!
line vty 0 4
 login
 transport input telnet
!
end
