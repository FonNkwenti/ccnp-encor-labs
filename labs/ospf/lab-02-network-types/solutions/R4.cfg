!
! R4 -- OSPF Lab 02 -- Network Types + DR/BDR Manipulation (SOLUTION)
! Internal router in Area 1. Gi0/0 (the transit to R2) is converted from
! default broadcast to OSPF network type point-to-point -- this must
! match R2 Gi0/1 or the adjacency will fail with a network-type
! mismatch. The /30 already behaves logically as p2p; now the OSPF state
! reflects that.
!
! Gi0/2 is the PC1 LAN edge and stays passive (no change from lab-01).
! Custom 5/20 hello/dead timers persist through the p2p conversion --
! changing the network type on an ethernet interface does not rewrite
! timer defaults the way serial encapsulation does.
!
hostname R4
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
 ipv6 address 2001:DB8:FF::4/128
 ospfv3 1 ipv6 area 1
!
interface GigabitEthernet0/0
 description AREA1_R2-Gi0/1
 ip address 10.1.24.2 255.255.255.252
 ip ospf network point-to-point
 ip ospf hello-interval 5
 ip ospf dead-interval 20
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:24::2/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
interface GigabitEthernet0/2
 description AREA1_PC1-LAN
 ip address 192.168.1.1 255.255.255.0
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:1::1/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
router ospf 1
 router-id 4.4.4.4
 passive-interface GigabitEthernet0/2
 network 4.4.4.4 0.0.0.0 area 1
 network 10.1.24.0 0.0.0.3 area 1
 network 192.168.1.0 0.0.0.255 area 1
!
router ospfv3 1
 router-id 4.4.4.4
 !
 address-family ipv6 unicast
  passive-interface GigabitEthernet0/2
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
