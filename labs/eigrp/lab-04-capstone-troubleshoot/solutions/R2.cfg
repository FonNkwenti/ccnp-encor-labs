!
! R2 -- Branch A router / variance point
! Lab 04: Comprehensive Troubleshooting -- Capstone II (known-good reference)
! Named mode dual-stack EIGRP. R2 sits between the core (R1), summarizer (R3),
! and stub (R4), and is the variance point for unequal-cost load balancing
! toward 192.168.1.0/24 / 2001:DB8:1:1::/64.
!   * bandwidth 100000 under Gi0/1 (TO_R3) -- 100 Mbps side of the asymmetric pair
!   * variance 8 in both AFs -- installs both the 1 Gbps and 100 Mbps paths
!
hostname R2
!
no ip domain-lookup
ipv6 unicast-routing
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
 ipv6 address 2001:DB8:FF::2/128
!
interface GigabitEthernet0/0
 description TO_R1
 ip address 10.12.0.2 255.255.255.252
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:12::2/64
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3
 bandwidth 100000
 ip address 10.23.0.1 255.255.255.252
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:23::1/64
 no shutdown
!
interface GigabitEthernet0/2
 description TO_R4
 ip address 10.24.0.1 255.255.255.252
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:24::1/64
 no shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router eigrp EIGRP-LAB
 !
 address-family ipv4 unicast autonomous-system 100
  eigrp router-id 2.2.2.2
  variance 8
  network 2.2.2.2 0.0.0.0
  network 10.12.0.0 0.0.0.3
  network 10.23.0.0 0.0.0.3
  network 10.24.0.0 0.0.0.3
 exit-address-family
 !
 address-family ipv6 unicast autonomous-system 100
  eigrp router-id 2.2.2.2
  variance 8
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
