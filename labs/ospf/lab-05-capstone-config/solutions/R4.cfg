!
! R4 -- OSPF Lab 05 -- Capstone I: Full Protocol Mastery (SOLUTION)
! Internal router in Area 1 (Totally Stubby). Loopback1-4 serve as
! the summarization targets that ABR R2 aggregates into 10.1.4.0/22.
!
hostname R4
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
 ipv6 address 2001:DB8:FF::4/128
 ospfv3 1 ipv6 area 1
!
interface Loopback1
 description SUMMARIZATION_TARGET_1
 ip address 10.1.4.1 255.255.255.0
 ipv6 address 2001:DB8:1:4::1/64
 ospfv3 1 ipv6 area 1
!
interface Loopback2
 description SUMMARIZATION_TARGET_2
 ip address 10.1.5.1 255.255.255.0
 ipv6 address 2001:DB8:1:5::1/64
 ospfv3 1 ipv6 area 1
!
interface Loopback3
 description SUMMARIZATION_TARGET_3
 ip address 10.1.6.1 255.255.255.0
 ipv6 address 2001:DB8:1:6::1/64
 ospfv3 1 ipv6 area 1
!
interface Loopback4
 description SUMMARIZATION_TARGET_4
 ip address 10.1.7.1 255.255.255.0
 ipv6 address 2001:DB8:1:7::1/64
 ospfv3 1 ipv6 area 1
!
interface GigabitEthernet0/0
 description AREA1_R2-Gi0/1
 ip address 10.1.24.2 255.255.255.252
 ip ospf network point-to-point
 ip ospf hello-interval 5
 ip ospf dead-interval 20
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:24::2/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
interface GigabitEthernet0/1
 description AREA1_R6-Gi0/1
 ip address 10.1.46.1 255.255.255.252
 ip ospf network point-to-point
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:46::1/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
interface GigabitEthernet0/2
 description AREA1_PC1-LAN
 ip address 192.168.1.1 255.255.255.0
 ipv6 address FE80::4 link-local
 ipv6 address 2001:DB8:1:1::1/64
 ospfv3 1 ipv6 area 1
 no shutdown
!
router ospf 1
 router-id 4.4.4.4
 area 1 stub
 passive-interface GigabitEthernet0/2
 network 4.4.4.4 0.0.0.0 area 1
 network 10.1.4.0 0.0.0.255 area 1
 network 10.1.5.0 0.0.0.255 area 1
 network 10.1.6.0 0.0.0.255 area 1
 network 10.1.7.0 0.0.0.255 area 1
 network 10.1.24.0 0.0.0.3 area 1
 network 10.1.46.0 0.0.0.3 area 1
 network 192.168.1.0 0.0.0.255 area 1
!
router ospfv3 1
 router-id 4.4.4.4
 !
 address-family ipv6 unicast
  area 1 stub
  passive-interface GigabitEthernet0/2
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
