!
! R3 — Initial configuration (lab-00 starting point)
! IP addressing pre-loaded; OSPF is NOT configured
!
hostname R3
!
no ip domain-lookup
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
interface GigabitEthernet0/0
 description TO_AREA0_BROADCAST_SEGMENT
 ip address 10.0.123.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R5_Gi0/0
 ip address 10.2.35.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
