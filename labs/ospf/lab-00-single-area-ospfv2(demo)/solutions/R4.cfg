!
! R4 — Internal router (Area 1 in later labs) — single-area in lab-00
! Lab 00: Single-Area OSPFv2 Fundamentals — Solution
!
hostname R4
!
no ip domain-lookup
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
!
interface GigabitEthernet0/0
 description TO_R2_Gi0/1
 ip address 10.1.24.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 no ip address
 shutdown
!
interface GigabitEthernet0/2
 description LAN_PC1_SEGMENT
 ip address 192.168.1.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router ospf 1
 router-id 4.4.4.4
 passive-interface GigabitEthernet0/2
 network 4.4.4.4 0.0.0.0 area 0
 network 10.1.24.0 0.0.0.3 area 0
 network 192.168.1.0 0.0.0.255 area 0
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
