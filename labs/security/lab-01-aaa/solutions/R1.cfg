hostname R1
!
no ip domain-lookup
ip domain-name encor-lab.local
enable secret Encor-Enable-2026
!
username admin privilege 15 secret Encor-Admin-2026
username operator privilege 7 secret Encor-Oper-2026
!
privilege exec level 7 show ip interface brief
privilege exec level 7 show interfaces
privilege exec level 7 show ip route
privilege exec level 7 ping
privilege exec level 7 traceroute
!
aaa new-model
!
aaa authentication login default local
aaa authentication login SSH_AUTH local
!
aaa authorization exec default local
aaa authorization commands 7 default local
!
aaa accounting exec default start-stop local
!
ipv6 unicast-routing
!
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
ip ssh source-interface Loopback0
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
 ipv6 address 2001:db8:1::1/128
!
interface GigabitEthernet0/0
 description To R2
 ip address 10.1.12.1 255.255.255.252
 ipv6 address 2001:db8:12::1/64
 no shutdown
!
interface GigabitEthernet0/1
 description To R3
 ip address 10.1.13.1 255.255.255.252
 ipv6 address 2001:db8:13::1/64
 no shutdown
!
interface GigabitEthernet0/2
 description To SW1
 ip address 192.168.10.1 255.255.255.0
 ipv6 address 2001:db8:10::1/64
 no shutdown
!
router ospf 1
 router-id 1.1.1.1
 passive-interface GigabitEthernet0/2
 network 1.1.1.1 0.0.0.0 area 0
 network 10.1.12.0 0.0.0.3 area 0
 network 10.1.13.0 0.0.0.3 area 0
 network 192.168.10.0 0.0.0.255 area 0
!
line console 0
 exec-timeout 10 0
 logging synchronous
!
line vty 0 4
 login authentication SSH_AUTH
 transport input ssh
 exec-timeout 5 0
!
end
