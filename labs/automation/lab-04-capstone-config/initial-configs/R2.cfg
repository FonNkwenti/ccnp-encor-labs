hostname R2
!
no ip domain-lookup
ip domain-name encor-lab.local
!
username admin privilege 15 secret Encor-API-2026
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
interface GigabitEthernet1
 description To R1
 ip address 10.1.12.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet2
 description To R3
 ip address 10.1.23.1 255.255.255.252
 no shutdown
!
line console 0
 login local
 exec-timeout 10 0
 logging synchronous
!
line vty 0 4
 login local
 transport input telnet
 exec-timeout 5 0
!
end
