hostname R2
!
no ip domain-lookup
ip domain-name encor-lab.local
enable secret Encor-Enable-2026
!
username admin privilege 15 secret Encor-Admin-2026
username operator privilege 7 secret Encor-Oper-2026
!
privilege exec level 7 show ip interface brief
privilege exec level 7 show interfaces
privilege exec level 7 show ip route
privilege exec level 7 ping
privilege exec level 7 traceroute
!
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
ip ssh source-interface Loopback0
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
interface GigabitEthernet0/0
 description To R1
 ip address 10.1.12.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description To R3
 ip address 10.1.23.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description To SW1
 ip address 192.168.20.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 2.2.2.2
 passive-interface GigabitEthernet0/2
 network 2.2.2.2 0.0.0.0 area 0
 network 10.1.12.0 0.0.0.3 area 0
 network 10.1.23.0 0.0.0.3 area 0
 network 192.168.20.0 0.0.0.255 area 0
!
line console 0
 login local
 exec-timeout 10 0
 logging synchronous
!
line vty 0 4
 login local
 transport input ssh
 exec-timeout 5 0
!
end
