!
! R3 -- OSPF Lab 05 -- Capstone I (INITIAL CONFIG)
! IP addressing only. No routing protocol configuration.
! Students configure OSPF from scratch.
!
hostname R3
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
 ipv6 address 2001:DB8:FF::3/128
 no shutdown
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.3 255.255.255.0
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:0:123::3/64
 no shutdown
!
interface GigabitEthernet0/1
 description AREA2_R5-Gi0/0
 ip address 10.2.35.1 255.255.255.252
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:2:35::1/64
 no shutdown
!
line vty 0 4
 login
 transport input telnet
!
end
