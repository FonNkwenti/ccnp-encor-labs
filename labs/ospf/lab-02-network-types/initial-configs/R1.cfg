!
! R1 -- OSPF Lab 01 -- Multi-Area OSPFv2 + Dual-Stack (SOLUTION)
! Backbone router (Area 0 only). Participates on the SW-AREA0 shared
! segment via Gi0/0. IPv6 dual-stack enabled: OSPFv3 IPv6 address-family
! runs alongside OSPFv2 for full dual-stack coverage.
!
hostname R1
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
 ipv6 address 2001:DB8:FF::1/128
 ospfv3 1 ipv6 area 0
!
interface GigabitEthernet0/0
 description AREA0_SW-AREA0
 ip address 10.0.123.1 255.255.255.0
 ipv6 address FE80::1 link-local
 ipv6 address 2001:DB8:0:123::1/64
 ospfv3 1 ipv6 area 0
 no shutdown
!
router ospf 1
 router-id 1.1.1.1
 network 1.1.1.1 0.0.0.0 area 0
 network 10.0.123.0 0.0.0.255 area 0
!
router ospfv3 1
 router-id 1.1.1.1
 !
 address-family ipv6 unicast
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
