!
! R2 -- Secondary LAN Gateway (iosv)
! Lab 02: HSRP -- Solution
! Adds IPv6 addressing, HSRPv2 group 1 (IPv4 Standby, priority 100),
! HSRPv2 group 2 (IPv6), and OSPFv3.
!
hostname R2
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
 ipv6 address 2001:DB8:FF::2/128
 ip ospf 1 area 0
 ipv6 ospf 1 area 0
!
interface GigabitEthernet0/0
 description TO_SW-LAN
 ip address 192.168.1.3 255.255.255.0
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:1:1::3/64
 ipv6 ospf 1 area 0
 ip ospf 1 area 0
 standby version 2
 standby 1 ip 192.168.1.1
 standby 1 priority 100
 standby 1 preempt
 standby 2 ipv6 2001:DB8:1:1::1/64
 standby 2 priority 100
 standby 2 preempt
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3_UPLINK
 ip address 10.0.23.1 255.255.255.252
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:23::1/64
 ipv6 ospf 1 area 0
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/2
 description TO_R1_DIRECT
 ip address 10.0.12.2 255.255.255.252
 ipv6 address FE80::2 link-local
 ipv6 address 2001:DB8:12::2/64
 ipv6 ospf 1 area 0
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router ospf 1
 router-id 2.2.2.2
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2
!
ipv6 router ospf 1
 router-id 2.2.2.2
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2
!
ntp authentication-key 1 md5 NTP_KEY_1
ntp authenticate
ntp trusted-key 1
ntp server 1.1.1.1 key 1
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
