!
! R2 -- Initial configuration (lab-01 starting point)
! NEW device introduced in lab-01. AS 65001 (same as R1, enterprise edge).
! OSPFv2 pre-configured on R1-R2 internal link for iBGP next-hop reachability.
! BGP is NOT configured -- student adds iBGP to R1 and eBGP to R3 in Section 5.
!
hostname R2
!
no ip domain-lookup
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
interface GigabitEthernet0/0
 description TO_R1_INTERNAL
 ip address 10.0.12.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R3
 ip address 10.0.23.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router ospf 1
 router-id 2.2.2.2
 passive-interface default
 no passive-interface GigabitEthernet0/0
 network 2.2.2.2 0.0.0.0 area 0
 network 10.0.12.0 0.0.0.3 area 0
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
