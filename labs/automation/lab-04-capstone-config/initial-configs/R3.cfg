hostname R3
!
no ip domain-lookup
ip domain-name encor-lab.local
!
username admin privilege 15 secret Encor-API-2026
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
interface GigabitEthernet0/0
 description To R2
 ip address 10.1.23.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description To PC2
 ip address 192.168.20.1 255.255.255.0
 no shutdown
!
line console 0
 login local
 exec-timeout 10 0
 logging synchronous
!
line vty 0 4
 login local
 transport input telnet
 exec-timeout 5 0
!
end
