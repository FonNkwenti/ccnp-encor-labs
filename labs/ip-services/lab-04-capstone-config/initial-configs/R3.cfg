!
! R3 -- Upstream / ISP Router (iosv)
! Lab 04: IP Services Full Mastery -- Capstone I (Initial Configuration)
! IP addressing only. No routing protocols or NTP configured.
!
hostname R3
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
 ipv6 address 2001:DB8:FF::3/128
!
interface Loopback1
 description SIMULATED_INTERNET_SERVER
 ip address 203.0.113.1 255.255.255.0
!
interface GigabitEthernet0/0
 description TO_R1_UPLINK
 ip address 10.0.13.2 255.255.255.252
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:13::2/64
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R2_UPLINK
 ip address 10.0.23.2 255.255.255.252
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:23::2/64
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
