!
! R5 -- OSPF Lab 04 -- Summarization and Filtering (SOLUTION)
! ASBR in Area 2 (NSSA). R5 performs ASBR summarization of the two
! external loopback networks into a single aggregate.
!
! Key additions from lab-04 initial config (= lab-03 solution):
!   summary-address 172.16.0.0 255.255.0.0 -- ASBR external route
!     summarization. Instead of generating two separate Type 7 LSAs
!     (172.16.5.0/24 and 172.16.6.0/24), R5 generates one Type 7 LSA
!     for 172.16.0.0/16. The ABR (R3) translates it to a single Type 5
!     LSA into Area 0. Individual /24 Type 7 LSAs are suppressed.
!   summary-prefix 2001:DB8:172::/48 -- IPv6 ASBR summarization under
!     OSPFv3 address-family. Aggregates 2001:db8:172:5::/64 and
!     2001:db8:172:6::/64 into a single Type 7 LSA.
!
hostname R5
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
 ipv6 address 2001:DB8:FF::5/128
 ospfv3 1 ipv6 area 2
!
interface Loopback1
 description EXTERNAL_SIMULATED_ISP_1
 ip address 172.16.5.1 255.255.255.0
 ipv6 address 2001:DB8:172:5::1/64
 no shutdown
!
interface Loopback2
 description EXTERNAL_SIMULATED_ISP_2
 ip address 172.16.6.1 255.255.255.0
 ipv6 address 2001:DB8:172:6::1/64
 no shutdown
!
interface GigabitEthernet0/0
 description AREA2_R3-Gi0/1
 ip address 10.2.35.2 255.255.255.252
 ip ospf network point-to-point
 ipv6 address FE80::5 link-local
 ipv6 address 2001:DB8:2:35::2/64
 ospfv3 1 ipv6 area 2
 no shutdown
!
interface GigabitEthernet0/1
 description AREA2_PC2-LAN
 ip address 192.168.2.1 255.255.255.0
 ipv6 address FE80::5 link-local
 ipv6 address 2001:DB8:2:2::1/64
 ospfv3 1 ipv6 area 2
 no shutdown
!
ip prefix-list EXTERNAL_LOOPS seq 5 permit 172.16.5.0/24
ip prefix-list EXTERNAL_LOOPS seq 10 permit 172.16.6.0/24
!
ipv6 prefix-list EXTERNAL_LOOPS_V6 seq 5 permit 2001:DB8:172:5::/64
ipv6 prefix-list EXTERNAL_LOOPS_V6 seq 10 permit 2001:DB8:172:6::/64
!
route-map REDIST_EXT permit 10
 match ip address prefix-list EXTERNAL_LOOPS
!
route-map REDIST_EXT_V6 permit 10
 match ipv6 address prefix-list EXTERNAL_LOOPS_V6
!
router ospf 1
 router-id 5.5.5.5
 area 2 nssa
 summary-address 172.16.0.0 255.255.0.0
 redistribute connected subnets route-map REDIST_EXT
 passive-interface GigabitEthernet0/1
 network 5.5.5.5 0.0.0.0 area 2
 network 10.2.35.0 0.0.0.3 area 2
 network 192.168.2.0 0.0.0.255 area 2
!
router ospfv3 1
 router-id 5.5.5.5
 !
 address-family ipv6 unicast
  area 2 nssa
  summary-prefix 2001:DB8:172::/48
  redistribute connected route-map REDIST_EXT_V6
  passive-interface GigabitEthernet0/1
 exit-address-family
!
line vty 0 4
 login
 transport input telnet
!
end
