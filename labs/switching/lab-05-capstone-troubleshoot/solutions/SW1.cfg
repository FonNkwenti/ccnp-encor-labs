!
! SW1 — Distribution switch / core
! Lab 05: Layer 2 Comprehensive Troubleshooting — Capstone II — Known-good state
!
hostname SW1
!
no ip domain-lookup
!
vlan 10
 name SALES
vlan 20
 name ENGINEERING
vlan 30
 name MANAGEMENT_HOSTS
vlan 99
 name NATIVE_MGMT
!
! --- Spanning Tree: Rapid PVST+, SW1 root for VLAN 10, 30, 99 ---
spanning-tree mode rapid-pvst
spanning-tree vlan 10,30,99 priority 4096
spanning-tree vlan 20 priority 8192
!
port-channel load-balance src-dst-mac
!
! --- Trunk to R1 (router-on-a-stick uplink) ---
interface GigabitEthernet0/0
 description TRUNK_TO_R1_Gi0/0
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 spanning-tree guard root
 no shutdown
!
! --- Po1 members: SW1 <-> SW2 (LACP active) ---
interface GigabitEthernet0/1
 description PO1_MEMBER_TO_SW2_Gi0/1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 channel-group 1 mode active
 no shutdown
!
interface GigabitEthernet0/2
 description PO1_MEMBER_TO_SW2_Gi0/2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 channel-group 1 mode active
 no shutdown
!
! --- Po2 members: SW1 <-> SW3 (PAgP desirable) ---
interface GigabitEthernet0/3
 description PO2_MEMBER_TO_SW3_Gi0/3
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 channel-group 2 mode desirable
 no shutdown
!
interface GigabitEthernet1/0
 description PO2_MEMBER_TO_SW3_Gi1/0
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 channel-group 2 mode desirable
 no shutdown
!
! --- Port-channel 1 (LACP — SW1 <-> SW2) ---
interface Port-channel1
 description LACP_PO1_TO_SW2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 spanning-tree guard root
 no shutdown
!
! --- Port-channel 2 (PAgP — SW1 <-> SW3) ---
interface Port-channel2
 description PAGP_PO2_TO_SW3
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 switchport nonegotiate
 spanning-tree guard root
 no shutdown
!
! --- Spare interfaces ---
interface GigabitEthernet1/1
 shutdown
!
interface GigabitEthernet1/2
 shutdown
!
interface GigabitEthernet1/3
 shutdown
!
! --- Management SVI ---
interface Vlan99
 description MANAGEMENT
 ip address 192.168.99.1 255.255.255.0
 no shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
