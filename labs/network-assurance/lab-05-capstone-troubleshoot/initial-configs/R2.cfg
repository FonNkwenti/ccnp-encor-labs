hostname R2
no ip domain-lookup
!
!
service timestamps log datetime msec
!
logging buffered 16384 informational
!
snmp-server community ENCOR-RO RO
snmp-server community ENCOR-RW RW
snmp-server host 2.2.2.2 version 2c ENCOR-RO
snmp-server enable traps snmp linkdown linkup coldstart
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
interface GigabitEthernet0/0
 ip address 192.168.20.1 255.255.255.0
 ipv6 address 2001:db8:20::1/64
 ipv6 ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/1
 ip address 10.1.12.2 255.255.255.252
 ipv6 address 2001:db8:12::2/64
 ipv6 ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/2
 ip address 10.1.23.1 255.255.255.252
 ipv6 address 2001:db8:23::1/64
 ipv6 ospf 1 area 0
 no shutdown
!
router ospf 1
 router-id 2.2.2.2
 passive-interface GigabitEthernet0/0
 network 2.2.2.2 0.0.0.0 area 0
 network 10.1.12.0 0.0.0.3 area 0
 network 10.1.23.0 0.0.0.3 area 0
 network 192.168.20.0 0.0.0.255 area 0
!
ipv6 router ospf 1
 router-id 2.2.2.2
 passive-interface GigabitEthernet0/0
!
end
