!
! R3 -- Upstream / ISP router (iosv)
! Lab 02: HSRP -- Solution
! Adds IPv6 addressing and OSPFv3.
!
hostname R3
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
 ipv6 address 2001:DB8:FF::3/128
 ip ospf 1 area 0
 ipv6 ospf 1 area 0
!
interface Loopback1
 description SIMULATED_INTERNET_SERVER
 ip address 203.0.113.1 255.255.255.0
 ip ospf 1 area 0
!
interface GigabitEthernet0/0
 description TO_R1_UPLINK
 ip address 10.0.13.2 255.255.255.252
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:13::2/64
 ipv6 ospf 1 area 0
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/1
 description TO_R2_UPLINK
 ip address 10.0.23.2 255.255.255.252
 ipv6 address FE80::3 link-local
 ipv6 address 2001:DB8:23::2/64
 ipv6 ospf 1 area 0
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 shutdown
!
interface GigabitEthernet0/3
 no ip address
 shutdown
!
router ospf 1
 router-id 3.3.3.3
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
!
ipv6 router ospf 1
 router-id 3.3.3.3
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
!
ntp authentication-key 1 md5 NTP_KEY_1
ntp authenticate
ntp trusted-key 1
ntp server 1.1.1.1 key 1
!
line con 0
 logging synchronous
 exec-timeout 0 0
line vty 0 4
 logging synchronous
 exec-timeout 0 0
!
end
