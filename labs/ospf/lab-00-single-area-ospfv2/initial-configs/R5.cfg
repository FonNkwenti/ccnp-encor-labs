!
! R5 — OSPF Lab 00 — Single-Area OSPFv2 Fundamentals (INITIAL)
! IP addressing pre-loaded on Gi0/0 (uplink to R3) and Gi0/1 (PC2 LAN).
! OSPF is NOT configured; the student enables OSPF and sets the PC2 LAN
! interface to passive.
!
hostname R5
!
no ip domain-lookup
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
!
interface GigabitEthernet0/0
 description AREA0_R3-Gi0/1
 ip address 10.2.35.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description AREA0_PC2-LAN
 ip address 192.168.2.1 255.255.255.0
 no shutdown
!
line vty 0 4
 login
 transport input telnet
!
end
